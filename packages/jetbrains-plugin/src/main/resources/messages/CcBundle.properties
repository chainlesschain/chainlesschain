# ChainlessChain IDE Bridge — English base bundle (default locale).
# Action text/description resolve via action.<id>.text / action.<id>.description.
# Chinese lives in CcBundle_zh.properties. Read as UTF-8 by the platform.
# Key parity (this file <-> _zh, and every plugin.xml action id) is gated by
# PureLogicSmokeMain bundleParity().

