[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "forensics-bridge"
version = "0.1.0"
description = "Python sidecar for ChainlessChain Personal Data Hub — extracts + parses mobile data, exposes JSON-lines IPC to the Node hub"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "ChainlessChain Team" }]
keywords = ["chainlesschain", "personal-data-hub", "sidecar", "mobile-forensics"]

dependencies = []

[project.optional-dependencies]
sqlcipher = ["pysqlcipher3>=1.0.4"]
# WeChat 4.x / QQ NT desktop SQLCipher-4 decryption (pure-Python, no native
# SQLCipher build needed — AES-256-CBC + PBKDF2/HMAC via `cryptography`).
# `zstandard` decompresses WCDB-compressed message bodies (best-effort).
wechat = ["cryptography>=42", "zstandard>=0.22"]
ios = ["pymobiledevice3>=4.0"]
test = ["pytest>=8.0", "pytest-timeout>=2.3", "cryptography>=42", "zstandard>=0.22"]
dev = ["pyinstaller>=6.0"]

[project.scripts]
forensics-bridge = "forensics_bridge.ipc_server:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["forensics_bridge*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
timeout = 30
