<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Remote Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<!--
  Plan A Android terminal renderer.

  Static HTML + xterm.js (vendored locally so the WebView works offline /
  on locked-down networks). Loaded by TerminalSessionScreen's WebView; the
  Kotlin side talks to the JS via the `TerminalBridge` JavascriptInterface.

  Kotlin → JS: window.cc.onStdout(data: string) / cc.onExit({exitCode, signal})
  JS → Kotlin: TerminalBridge.onUserInput(data) / onResize(cols, rows) / onReady()

  This file is just the shell + ANSI rendering. All session state (history
  backfill, stdin/stdout routing, exit handling) is on the Kotlin side; the
  WebView is pure VT100 emulator.
-->
<link rel="stylesheet" href="file:///android_asset/terminal/xterm.css" />
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background: #1e1e1e;
    overflow: hidden;
    font-family: -apple-system, "Helvetica Neue", monospace;
  }
  #term {
    height: 100%; width: 100%;
  }
  .banner {
    color: #888;
    padding: 8px 12px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div id="term"></div>
  <script src="file:///android_asset/terminal/xterm.js"></script>
  <script src="file:///android_asset/terminal/addon-fit.js"></script>
  <script>
(function () {
  var X = window.Terminal;
  var FitAddon = window.FitAddon ? window.FitAddon.FitAddon : null;
  var term = null;
  var fitAddon = null;

  function init() {
    term = new X({
      cursorBlink: true,
      fontFamily: 'Consolas, "Courier New", monospace',
      fontSize: 13,
      theme: { background: '#1e1e1e', foreground: '#d4d4d4' },
      convertEol: false,
    });
    if (FitAddon) {
      fitAddon = new FitAddon();
      term.loadAddon(fitAddon);
    }
    term.open(document.getElementById('term'));
    try { fitAddon && fitAddon.fit(); } catch (e) { /* container 0×0 */ }

    // stdin: xterm.onData → Kotlin
    term.onData(function (data) {
      try { TerminalBridge.onUserInput(data); } catch (e) { /* Kotlin bridge unavailable */ }
    });

    // Resize hook — fitAddon fires when dimensions change.
    window.addEventListener('resize', function () {
      try {
        fitAddon && fitAddon.fit();
        TerminalBridge.onResize(term.cols, term.rows);
      } catch (e) { /* benign */ }
    });

    try { TerminalBridge.onReady(term.cols, term.rows); } catch (e) {}
  }

  // Public surface for Kotlin → JS calls.
  window.cc = {
    write: function (data) {
      if (term) term.write(data);
    },
    writeln: function (line) {
      if (term) term.writeln(line);
    },
    clear: function () {
      if (term) term.clear();
    },
    onStdout: function (data) {
      if (term) term.write(data);
    },
    onExit: function (payload) {
      if (!term) return;
      var code = payload && payload.exitCode !== undefined ? payload.exitCode : '-';
      var sig = payload && payload.signal ? payload.signal : '-';
      term.writeln('\r\n\x1b[33m[session exited, code=' + code + ', signal=' + sig + ']\x1b[0m');
    },
    fit: function () {
      try { fitAddon && fitAddon.fit(); } catch (e) { /* benign */ }
    },
    // Programmatic key injection (softkey toolbar in Compose UI).
    sendKey: function (sequence) {
      try { TerminalBridge.onUserInput(sequence); } catch (e) {}
    },
  };

  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(init, 0);
  } else {
    document.addEventListener('DOMContentLoaded', init);
  }
})();
  </script>
</body>
</html>
