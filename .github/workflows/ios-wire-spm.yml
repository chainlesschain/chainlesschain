name: iOS Wire SPM Packages (Manual)

# 手动 dispatch 触发：在 macOS runner 上跑 ios-app/scripts/wire_spm_packages.rb
# 把 5 个本地 SPM library (CoreCommon/CoreSecurity/CoreDID/CoreE2EE/CoreP2P)
# 接进 ChainlessChain.xcodeproj 的 app target。
#
# 起因：AppState.swift `import CoreCommon` 在 release.yml build-ios job 失败，
# 因为 pbxproj 缺 XCLocalSwiftPackageReference + XCSwiftPackageProductDependency。
# 通常在 Mac Xcode UI File → Add Package Dependency 操作，但 Xcode UI 不能
# headless 运行，所以用 xcodeproj Ruby gem 程序化补。
#
# 使用：GitHub → Actions → "iOS Wire SPM Packages (Manual)" → Run workflow
# - dry_run=true  (默认): 只打 diff 看效果不 commit
# - dry_run=false: 写 pbxproj + commit + push 回 main

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (only show diff, do NOT commit)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  wire-spm:
    name: Wire SPM packages into app target
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Ruby version
        run: ruby --version

      - name: Install xcodeproj gem
        run: |
          gem install xcodeproj
          ruby -e "require 'xcodeproj'; puts 'xcodeproj gem loaded successfully'"

      - name: Run wire_spm_packages.rb
        working-directory: ios-app
        run: ruby scripts/wire_spm_packages.rb

      - name: Show resulting diff
        run: |
          echo "=== git status ==="
          git status --short
          echo ""
          echo "=== git diff --stat ==="
          git diff --stat
          echo ""
          echo "=== first 200 lines of pbxproj diff ==="
          git diff ios-app/ChainlessChain.xcodeproj/project.pbxproj | head -200

      - name: Verify swift build still passes (sanity)
        working-directory: ios-app
        shell: bash
        run: |
          set -o pipefail
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          ARCH=$(uname -m)
          swift build \
            --triple ${ARCH}-apple-ios15.0-simulator \
            --sdk "$SDK_PATH" \
            -c debug \
            --target CoreP2P
          echo "✅ Phase 1-5 CoreP2P SPM build still passes after wiring"

      - name: Commit and push (if not dry run)
        if: ${{ inputs.dry_run == false }}
        run: |
          if git diff --quiet ios-app/ChainlessChain.xcodeproj/project.pbxproj; then
            echo "::notice::pbxproj unchanged (already fully wired) — nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios-app/ChainlessChain.xcodeproj/project.pbxproj

          # Commit FIRST (rebase needs clean index).
          git commit -m "$(cat <<'EOF'
          feat(ios): wire 5 local SPM libraries into ChainlessChain app target

          Auto-generated by .github/workflows/ios-wire-spm.yml — adds
          XCLocalSwiftPackageReference + XCSwiftPackageProductDependency for:
          - CoreCommon
          - CoreSecurity
          - CoreDID
          - CoreE2EE
          - CoreP2P

          Fixes the AppState.swift:3:8 "no such module 'CoreCommon'" error
          that prevented release.yml build-ios from producing real Simulator
          .app / .ipa (see commit 59a3c44cb).

          Run-id: ${{ github.run_id }}
          EOF
          )"

          # Push with retry on transient race (concurrent commits to main during
          # our checkout → push window). See feedback_parallel_session_git_race.
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "✅ Pushed pbxproj wiring to main"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "::warning::push attempt $attempt failed (likely concurrent commit), rebasing on origin/main and retrying..."
              sleep 5
              git fetch origin main
              if ! git rebase origin/main; then
                git rebase --abort || true
                echo "::error::Rebase conflict on attempt $attempt — pbxproj diverged on main. Re-run workflow."
                exit 1
              fi
            else
              echo "::error::push failed after 3 attempts"
              exit 1
            fi
          done

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "::notice::Dry run complete. Re-run with dry_run=false to commit pbxproj changes to main."
