name: Workspace Publish Staleness Check (PR mandatory)

# Mandatory gate for trap #7. For every publishable `packages/<pkg>/`
# workspace package, if files under lib/src/bin changed in the PR but
# package.json version did not bump, the PR fails.
#
# Skips:
#   - Private packages (`"private": true`)
#   - `personal-data-hub` and `cli` — already covered by the strict
#     `pdh-bundle-staleness-check.yml` which also asserts USR_VERSION
#     bump + cross-package dep propagation.
#
# Runs the same `scripts/lint-publish-staleness.mjs` that's available
# to local developers via `node scripts/lint-publish-staleness.mjs
# --base=@{u}` (informal); CI is the backstop for contributors without
# husky or who bypassed pre-push.

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'packages/**'
      - 'scripts/lint-publish-staleness.mjs'
      - '.github/workflows/publish-staleness-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: publish-staleness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need full history for diff vs base

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run publish-staleness lint
        id: lint
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"
          node scripts/lint-publish-staleness.mjs --base="$BASE_SHA" --head="$HEAD_SHA" 2>&1 | tee /tmp/lint.log
          # The script exits 2 on violations; we want to fail the job in that case.
          # But the `tee` masks the exit code, so capture PIPESTATUS.
          exit ${PIPESTATUS[0]}

      - name: Comment on PR with violations
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- publish-staleness-check-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let log = '(log unavailable)';
            try {
              log = fs.readFileSync('/tmp/lint.log', 'utf-8').split('\n').slice(-50).join('\n');
            } catch {}

            const body = [
              marker,
              '## ❌ Workspace Publish Staleness — package source changed but version did not bump',
              '',
              'This PR modifies files under `packages/<pkg>/{lib,src,bin}` but the',
              'corresponding `packages/<pkg>/package.json` `version` field is unchanged.',
              '',
              'If this lands, `npm publish` will refuse the existing version (422)',
              'and CI tends to silently treat that as idempotent → registry stays',
              'on the OLD code → downstream consumers (CLI, desktop app, sibling',
              'packages) keep getting the old behavior even after install.',
              '',
              '### Lint output',
              '',
              '```',
              log,
              '```',
              '',
              '### Fix',
              '',
              "1. Bump the package's `version` field in `package.json`.",
              "2. If any OTHER workspace package depends on it, bump that package's",
              "   dependency range AND that package's own version (so its consumers",
              "   also get the fix). See trap #7's 'dependency chain propagation'",
              "   section in `docs/internal/hidden-risk-traps.md`.",
              "3. Confirm `npm-publish.yml` workflow lists this package — if it's",
              "   a brand new package, add it.",
              "",
              `Run log: ${runUrl}`,
              '',
              '_Trap #7 in `docs/internal/hidden-risk-traps.md`. Auto-generated by `.github/workflows/publish-staleness-check.yml`._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Delete prior failure comment on clean run
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- publish-staleness-check-v1 -->';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
