name: Secret Scan Audit (PR advisory)

# Advisory gate: scan a PR's NEWLY added lines for high-confidence hard-coded
# secrets (PEM private-key blocks, cloud-provider keys, well-known token
# formats). On hit, post a comment to the PR. Does NOT block merge — a reviewer
# confirms whether each hit is a real credential or a test/example value.
#
# Why: the repo previously had zero secret scanning. The DID at-rest issue
# (hard-coded DB master key) showed how easily a credential can land silently.
# This is the regression guard for future additions. It is diff-scoped so the
# existing legit U-Key default PIN, doc examples, and fixtures don't trip.
#
# To graduate to blocking: drop `continue-on-error` on the audit step once the
# pattern set has run advisory across a few PRs with no false positives.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: secret-scan-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history to diff vs base

      - name: Run secret scan audit
        id: audit
        continue-on-error: true # advisory: comment on hit, don't block merge
        run: |
          bash scripts/audit-secrets.sh origin/${{ github.base_ref }}

      - name: Comment on PR if secret detected
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- secret-scan-audit-comment-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## ⚠️ Secret Scan Audit — possible hard-coded secret in diff',
              '',
              `This PR's newly added lines match one or more high-confidence secret patterns:`,
              '',
              '- PEM private-key block (`-----BEGIN ... PRIVATE KEY-----`)',
              '- AWS access key id (`AKIA...`)',
              '- GitHub token (`ghp_...` / `github_pat_...`)',
              '- Slack token (`xox[baprs]-...`)',
              '- Google API key (`AIza...`)',
              '- Stripe live secret key (`sk_live_...`)',
              '',
              `**Run locally to see hits:** \`bash scripts/audit-secrets.sh origin/${context.payload.pull_request.base.ref}\``,
              '',
              '### Reviewer next step',
              '',
              '1. Confirm whether the hit is a **real credential** or a test/example value.',
              '2. If real → remove it, **rotate** the credential, and load it from env / OS',
              '   keychain (see `desktop-app-vue/src/main/did/did-keystore.js` safeStorage pattern).',
              '3. If a legitimate example/fixture → false positive; this gate is advisory and',
              '   does not block merge.',
              '',
              `Audit run log: ${runUrl}`,
              '',
              '_Advisory only — does not block merge. Auto-generated by `.github/workflows/secret-scan-audit.yml`._'
            ].join('\n');

            // Upsert: find existing comment with our marker → update; else create
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              console.log(`Updated comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              console.log('Created new audit comment');
            }

      - name: Log clean audit
        if: steps.audit.outcome == 'success'
        run: |
          echo "✅ Secret scan audit clean — no high-confidence secrets in PR diff."
