name: CLI CI

on:
  push:
    branches: [main]
    paths:
      - "packages/cli/**"
      - ".github/workflows/cli-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/cli/**"
      - ".github/workflows/cli-ci.yml"
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ["22.12.0"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspace-aware)
        uses: ./.github/actions/setup-node-deps

      - name: Run unit tests
        working-directory: packages/cli
        run: npx vitest run __tests__/unit/

      - name: Run integration tests
        working-directory: packages/cli
        run: npx vitest run __tests__/integration/

      # E2E suite has known IPC-saturation issue on Windows/macOS:
      # init-and-cowork-commands.test.js alone runs 51 subprocess-spawn
      # tests in ~65s, which floods the Vitest worker→main stdout pipe
      # past the 60s "onTaskUpdate" RPC timeout (vitest/dist/chunks/rpc).
      #   --reporter=basic suppresses per-test output → less IPC traffic
      #   --reporter=junit writes to file → no live stdout
      # Two batches keep any single batch under the timeout even if one
      # heavy file straggles.
      - name: Run E2E tests (batch 1, a-o)
        working-directory: packages/cli
        shell: bash
        run: |
          files=(__tests__/e2e/[a-o]*.test.js)
          echo "Batch 1 files: ${#files[@]}"
          npx vitest run --config vitest.e2e.config.js --reporter=basic "${files[@]}"

      - name: Run E2E tests (batch 2, p-z)
        working-directory: packages/cli
        shell: bash
        run: |
          files=(__tests__/e2e/[p-z]*.test.js)
          echo "Batch 2 files: ${#files[@]}"
          npx vitest run --config vitest.e2e.config.js --reporter=basic "${files[@]}"

      - name: Verify CLI --version
        working-directory: packages/cli
        run: node bin/chainlesschain.js --version

      - name: Verify CLI --help
        working-directory: packages/cli
        run: node bin/chainlesschain.js --help

  # Phase 4a: validate `cc pack` end-to-end on Linux without running pkg.
  # Dry-run exercises precheck → web-panel → config-template → native-prebuilds
  # → pkg-config synthesis, which is where most platform regressions surface.
  # A full pkg + smoke run would need CC_PACK_E2E=1 and ~30s of pkg download
  # on every PR — out of scope for this job; use the manual e2e suite instead.
  pack-linux-dryrun:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies (workspace-aware)
        uses: ./.github/actions/setup-node-deps

      - name: Ensure web-panel dist exists (stub)
        working-directory: packages/cli
        run: |
          mkdir -p src/assets/web-panel
          if [ ! -f src/assets/web-panel/index.html ]; then
            echo '<!doctype html><title>stub</title>' > src/assets/web-panel/index.html
          fi

      - name: cc pack --dry-run for linux-x64
        working-directory: packages/cli
        run: |
          node bin/chainlesschain.js pack \
            --dry-run \
            --targets node20-linux-x64 \
            --allow-dirty \
            --skip-web-panel-build \
            --no-smoke-test

  dry-run-publish:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies (workspace-aware)
        uses: ./.github/actions/setup-node-deps

      - name: Dry-run publish
        working-directory: packages/cli
        run: npm publish --dry-run
