name: Full Test Automation with Auto-Fix

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *" # 每天凌晨2点运行
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  PYTHON_VERSION: "3.11"

# Cancel older runs of this workflow on the same branch/PR when a newer push
# arrives. Without this, multi-push diagnostic sessions stack runs and starve
# the runner queue (e.g. four parallel runs blocked CLI CI for 11+ min on
# 2026-05-04).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 健康检查 (advisory only — failures here do not block run-all-tests; see
  # issue #7 where a transient ECONNRESET in this job filed a false-positive
  # bug ticket).
  health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop-app-vue/package-lock.json

      - name: Run health checks
        working-directory: ./desktop-app-vue
        run: |
          for i in 1 2 3; do
            npm install --legacy-peer-deps && break || {
              echo "npm install attempt $i failed, retrying in $((i*15))s..."
              sleep $((i*15))
            }
          done
          node -e "const { getHealthCheckService } = require('./src/main/health-check'); const service = getHealthCheckService(); service.runChecks().then(r => console.log(JSON.stringify(r, null, 2)));" || true

  # 综合测试运行器
  run-all-tests:
    name: Run All Tests
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop-app-vue/package-lock.json

      - name: Install dependencies
        working-directory: ./desktop-app-vue
        shell: bash
        run: |
          for i in 1 2 3; do
            npm install --legacy-peer-deps && break || {
              echo "npm install attempt $i failed, retrying in $((i*15))s..."
              sleep $((i*15))
            }
          done

      - name: Run comprehensive test suite
        working-directory: ./desktop-app-vue
        run: node scripts/test-runner.js
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            desktop-app-vue/test-results/
            desktop-app-vue/coverage/

      - name: Attempt auto-fix on failure
        if: failure()
        working-directory: ./desktop-app-vue
        run: node scripts/auto-fix-runner.js

      - name: Retry tests after auto-fix
        if: failure()
        working-directory: ./desktop-app-vue
        run: node scripts/test-runner.js
        continue-on-error: true

  # 创建Issue如果测试失败
  create-issue-on-failure:
    name: Create Issue on Failure
    runs-on: ubuntu-latest
    needs: run-all-tests
    if: failure()

    steps:
      - uses: actions/github-script@v6
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const workflowUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `自动测试失败 - ${date}`,
              body: `## 自动测试失败报告\n\n**工作流运行**: [查看详情](${workflowUrl})\n**分支**: ${context.ref}\n**提交**: ${context.sha}\n**触发者**: ${context.actor}\n\n部分测试失败且无法自动修复。请查看工作流日志获取详细信息。\n\n### 下一步行动\n1. 查看测试日志\n2. 本地运行 \`npm run test:all\`\n3. 尝试运行 \`node scripts/auto-fix-runner.js\`\n4. 修复问题后重新提交`,
              labels: ['bug', 'automated-detection', 'test-failure', 'needs-triage']
            });
