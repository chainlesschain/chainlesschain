name: Local Terminal Bundle

# Phase 5 CI gate — Linux runner cross-compiles the full local-terminal
# native bundle (mksh + toybox + libpty_jni) which Windows host cannot
# produce (no HOSTCC for toybox). Uploads the produced .so set as an
# artifact so :app can audit them without trusting Windows-host builds
# silently dropping toybox.
#
# Triggers:
#   - Push to main affecting feature-local-terminal/, the workflow file
#     itself, or the wrapping CMakeLists / Gradle plumbing.
#   - Manual dispatch — operators can re-trigger after vendor source
#     bumps (mksh / toybox) without forcing a code commit.
#   - PR — same paths, so PRs surface "toybox build broke" early.

on:
  push:
    branches: [main]
    paths:
      - "android-app/feature-local-terminal/**"
      - "android-app/third_party/mksh/**"
      - "android-app/third_party/toybox/**"
      - ".github/workflows/local-terminal-bundle.yml"
  pull_request:
    branches: [main]
    paths:
      - "android-app/feature-local-terminal/**"
      - "android-app/third_party/mksh/**"
      - "android-app/third_party/toybox/**"
      - ".github/workflows/local-terminal-bundle.yml"
  workflow_dispatch:

# Cancel-in-progress when a newer commit lands on the same branch — saves
# Linux runner minutes when iterating quickly.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  NDK_VERSION: "25.2.9519653"

jobs:
  build-native:
    name: Build mksh + toybox + libpty_jni (Linux NDK)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # No submodules — feature-local-terminal vendors mksh + toybox
          # source directly under third_party/ (not via submodules).
          submodules: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          set -euo pipefail
          sdkmanager --install "ndk;${NDK_VERSION}" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "ANDROID_NDK=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "Installed NDK at ${ANDROID_HOME}/ndk/${NDK_VERSION}"
          ls "${ANDROID_HOME}/ndk/${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin/" | head -5

      - name: Confirm HOSTCC for toybox build
        run: |
          set -euo pipefail
          which gcc
          gcc --version | head -1
          which make
          make --version | head -1

      # First-CI-run diagnostic: mksh's Build.sh wraps every clang call in
      # `clang ... || rm -f conftest*` to clean up after expected probe
      # failures — but that pattern also swallows the real stderr if the
      # FINAL link line fails. Pre-run Build.sh manually so we see the
      # actual ld error before the gradle CMake invocation does the same
      # thing through ninja (which only surfaces "build stopped").
      - name: Debug — run mksh Build.sh standalone (capture link stderr)
        run: |
          set -euo pipefail
          mkdir -p /tmp/mksh-probe
          cp -r android-app/third_party/mksh/. /tmp/mksh-probe/
          cd /tmp/mksh-probe
          export CC="${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang"
          export TARGET_OS=Linux
          export TARGET_OSREV=5.10.0
          echo "::group::Build.sh stdout/stderr (manual probe)"
          # Run with verbose link (-v on clang shows ld invocation when
          # link fails). Drop -Q to get more output.
          if ! bash Build.sh -r 2>&1 | tail -120; then
            echo "::error::Build.sh exited non-zero"
          fi
          echo "::endgroup::"
          echo "::group::Final link retry with -v (force linker invocation print)"
          if ls *.o > /dev/null 2>&1; then
            # Retry the failing link line with -v to dump invoked linker + libs.
            ${CC} -v -O2 -Wall -fwrapv -o mksh-debug *.o 2>&1 | tail -40 || true
          else
            echo "no .o files left; previous compile failed earlier"
          fi
          echo "::endgroup::"

      - name: Grant gradlew exec
        run: chmod +x android-app/gradlew

      - name: Build :feature-local-terminal release AAR
        working-directory: android-app
        run: |
          set -euo pipefail
          # Release variant exercises the full strip + optimization path;
          # debug also works but ships unstripped .so files.
          ./gradlew :feature-local-terminal:assembleRelease --no-daemon --stacktrace

      - name: Inventory produced .so files
        working-directory: android-app/feature-local-terminal
        run: |
          set -euo pipefail
          echo "::group::All .so files under build/"
          find build/intermediates -name "*.so" -printf "%s\t%p\n" | sort -k2 | head -40
          echo "::endgroup::"

          # Hard-gate: each ABI must produce all three of {mksh, toybox, pty_jni}.
          # AGP picks the CXX build dir based on Kotlin build type — `Release`
          # for plain `assembleRelease`, `RelWithDebInfo` for the optimization
          # path our module triggers (see release variant kotlinOptions).
          # Match either to be robust against future kotlin build-type swaps.
          for abi in arm64-v8a armeabi-v7a x86_64; do
            for lib in libmksh.so libtoybox.so libpty_jni.so; do
              path=$(ls build/intermediates/cxx/*/*/obj/${abi}/${lib} 2>/dev/null | head -1)
              if [ -z "${path}" ]; then
                echo "::error::missing ${lib} for ${abi}"
                exit 1
              fi
              size=$(stat -c%s "${path}")
              echo "  ${abi}/${lib} -> ${size} bytes ($path)"
            done
          done

      - name: Verify ELF architectures
        working-directory: android-app/feature-local-terminal
        run: |
          set -euo pipefail
          # Probe each .so so we catch a mis-config where the toolchain
          # silently produces a host-x86_64 binary (would surface as
          # SIGILL on the device — much better caught here).
          declare -A EXPECTED=(
            [arm64-v8a]="ARM aarch64"
            [armeabi-v7a]="ARM,"
            [x86_64]="x86-64"
          )
          for abi in arm64-v8a armeabi-v7a x86_64; do
            for lib in libmksh.so libtoybox.so libpty_jni.so; do
              path=$(ls build/intermediates/cxx/*/*/obj/${abi}/${lib} 2>/dev/null | head -1)
              [ -n "${path}" ] || { echo "::error::no ${lib} for ${abi}"; exit 1; }
              got=$(file "${path}")
              echo "  ${path}"
              echo "    -> ${got}"
              if ! echo "${got}" | grep -q "${EXPECTED[$abi]}"; then
                echo "::error::${abi}/${lib} expected '${EXPECTED[$abi]}' but got: ${got}"
                exit 1
              fi
            done
          done

      - name: Upload native bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: local-terminal-native-bundle
          path: |
            android-app/feature-local-terminal/build/intermediates/cxx/*/*/obj/*/lib*.so
            android-app/feature-local-terminal/build/outputs/aar/feature-local-terminal-release.aar
          if-no-files-found: error
          retention-days: 30

      - name: Summary
        if: always()
        working-directory: android-app/feature-local-terminal
        run: |
          {
            echo "## Phase 5 Local Terminal Native Bundle"
            echo ""
            echo "| ABI | mksh | toybox | pty_jni |"
            echo "|---|---|---|---|"
            for abi in arm64-v8a armeabi-v7a x86_64; do
              row="| ${abi} |"
              for lib in libmksh.so libtoybox.so libpty_jni.so; do
                path=$(ls build/intermediates/cxx/*/*/obj/${abi}/${lib} 2>/dev/null | head -1)
                if [ -n "${path}" ]; then
                  sz=$(stat -c%s "${path}")
                  row="${row} ${sz} B |"
                else
                  row="${row} MISSING |"
                fi
              done
              echo "${row}"
            done
            echo ""
            echo "Workflow: \`local-terminal-bundle.yml\`"
            echo "NDK: \`${NDK_VERSION}\`"
            echo "Trigger: \`${{ github.event_name }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
