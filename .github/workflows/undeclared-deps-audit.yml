name: Undeclared Dependency Audit (PR mandatory)

# Mandatory gate against hoisting-masked undeclared runtime dependencies.
#
# For every npm workspace package under `packages/<pkg>/`, runtime source
# (lib/src/bin) is scanned for `require()` / `import` of external modules
# that the package does NOT declare in dependencies / peerDependencies /
# optionalDependencies. Such an import resolves locally only because the
# module is hoisted to the monorepo root (or declared by a sibling), but a
# standalone `npm i @chainlesschain/<pkg>` ships a package that throws
# MODULE_NOT_FOUND on that path. This bit `@chainlesschain/core-db` (the
# documented sql.js WASM fallback driver was undeclared) and the `@noble/*`
# packages in core-settlement / core-multisig before it.
#
# Ratchet: a curated baseline of pre-existing items lives in the script.
# The job FAILS only on NEW undeclared imports — so no fresh instance of
# the class can land, while existing debt is tracked (with the correct fix
# per item) and burned down in each package's normal release cycle.
#
# Runs the same `scripts/lint-undeclared-deps.mjs` available locally via
# `node scripts/lint-undeclared-deps.mjs`.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "packages/**"
      - "scripts/lint-undeclared-deps.mjs"
      - "scripts/__tests__/lint-undeclared-deps.test.mjs"
      - ".github/workflows/undeclared-deps-audit.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: undeclared-deps-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Run lint unit tests
        run: node --test scripts/__tests__/lint-undeclared-deps.test.mjs

      - name: Run undeclared-deps audit
        id: lint
        run: |
          node scripts/lint-undeclared-deps.mjs 2>&1 | tee /tmp/undeclared.log
          # tee masks the script exit code; recover it from PIPESTATUS.
          exit ${PIPESTATUS[0]}

      - name: Comment on PR with violations
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- undeclared-deps-audit-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let log = '(log unavailable)';
            try {
              log = fs.readFileSync('/tmp/undeclared.log', 'utf-8').split('\n').slice(-60).join('\n');
            } catch {}

            const body = [
              marker,
              '## ❌ Undeclared Dependency Audit — runtime code imports a module the package does not declare',
              '',
              'A file under `packages/<pkg>/{lib,src,bin}` does `require()` / `import`',
              'an external module that is **not** in that package\'s `dependencies`,',
              '`peerDependencies`, or `optionalDependencies`.',
              '',
              'It resolves in CI only because the module is hoisted to the monorepo',
              'root (or declared by a sibling). A standalone `npm i` of the package',
              'would throw `MODULE_NOT_FOUND` on that import.',
              '',
              '### Audit output',
              '',
              '```',
              log,
              '```',
              '',
              '### Fix',
              '',
              "1. Add the module to the package's `dependencies` (or",
              '   `optionalDependencies` if it is a soft/fallback/optional driver).',
              "2. Bump the package `version` and propagate the dep range to any",
              '   sibling workspace package that pins it (trap #28).',
              '3. If it is genuinely host-provided (electron/vscode-style ambient),',
              '   add it to `ALLOWED_AMBIENT` in `scripts/lint-undeclared-deps.mjs`.',
              '',
              `Run log: ${runUrl}`,
              '',
              '_Auto-generated by `.github/workflows/undeclared-deps-audit.yml`._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Delete prior failure comment on clean run
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- undeclared-deps-audit-v1 -->';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
