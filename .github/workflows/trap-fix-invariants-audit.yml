name: Trap-Fix Invariants Audit (PR mandatory)

# Mandatory gate that guards known-good trap fixes from being silently
# regressed by a refactor. Each entry in the audit script declares
#   (file, required-pattern-set)
# and the workflow fails if any required pattern disappears.
#
# Currently covered:
#   #13 — desktop-app-vue/scripts/asar-surgery.js B4 walker-dropped pkg
#         injection
#   #22 — android-app/.../MediaPipeLlmEngine.kt prompt-length pre-check
#   #24 — android-app/.../LocalFilesystemBootstrapper.kt companion Mutex
#         + tmp+rename atomicity
#   #26 — desktop-app-vue/src/main/index.js GPU crash recovery flow
#
# Mandatory because the fix-in-place is the trap's mitigation; losing
# it silently is the exact symptom the trap describes. Each pattern set
# is intentionally loose (matches "the building blocks are still
# there"), not "this exact line." Reviewers still need to read the
# code for correctness — this gate only protects against pure deletion.

on:
  pull_request:
    paths:
      - 'android-app/app/src/main/java/com/chainlesschain/android/pdh/llm/MediaPipeLlmEngine.kt'
      - 'android-app/feature-local-terminal/src/main/java/com/chainlesschain/android/feature/localterminal/LocalFilesystemBootstrapper.kt'
      - 'desktop-app-vue/src/main/index.js'
      - 'desktop-app-vue/scripts/asar-surgery.js'
      - 'scripts/audit-trap-fix-invariants.js'
      - '.github/workflows/trap-fix-invariants-audit.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: trap-fix-invariants-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run invariants audit
        id: audit
        run: |
          node scripts/audit-trap-fix-invariants.js | tee /tmp/audit.log
          exit ${PIPESTATUS[0]}

      - name: Comment on PR with missing patterns
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- trap-fix-invariants-audit-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let log = '(log unavailable)';
            try {
              log = fs.readFileSync('/tmp/audit.log', 'utf-8').split('\n').slice(-40).join('\n');
            } catch {}

            const body = [
              marker,
              '## ❌ Trap-Fix Invariants Audit — a known-good fix is missing required patterns',
              '',
              "This PR touches a file that's a designated trap-fix guard.",
              'The audit verified that the building blocks of the fix are still',
              'present and one or more are now missing — likely a refactor silently',
              'dropped them.',
              '',
              '### Why this is mandatory',
              '',
              "Each guarded file *is* the trap's mitigation. If the patterns drop",
              "out, the trap fires again. Code review can't reliably catch",
              "removal-by-refactor; this gate is the regression backstop.",
              '',
              '### Audit output',
              '',
              '```',
              log,
              '```',
              '',
              '### Fix',
              '',
              'Either:',
              '  1. Re-add the missing pattern(s) — the audit output points at',
              '     the original location.',
              '  2. If the fix has been intentionally restructured, update',
              "     `scripts/audit-trap-fix-invariants.js` to match the new",
              '     pattern set (and explain in PR conversation why the new',
              "     pattern is equivalent).",
              '',
              `Run log: ${runUrl}`,
              '',
              '_Trap #22 / #26 in `docs/internal/hidden-risk-traps.md`. Auto-generated by `.github/workflows/trap-fix-invariants-audit.yml`._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Delete prior failure comment on clean run
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- trap-fix-invariants-audit-v1 -->';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
