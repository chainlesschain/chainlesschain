name: IDE Extensions

# Builds the two IDE-bridge editor extensions and uploads their artifacts.
# Publishing to the marketplaces happens ONLY on a dedicated tag and ONLY when
# the corresponding secret is present — a normal push just builds + uploads.
#
#   tag ide-vscode-v*     -> publish the VS Code extension   (needs VSCE_PAT)
#   tag ide-jetbrains-v*  -> publish the JetBrains plugin     (needs JETBRAINS_PUBLISH_TOKEN)

on:
  push:
    branches: [main]
    paths:
      - "packages/vscode-extension/**"
      - "packages/jetbrains-plugin/**"
      - ".github/workflows/ide-extensions.yml"
    tags:
      - "ide-vscode-v*"
      - "ide-jetbrains-v*"
  pull_request:
    paths:
      - "packages/vscode-extension/**"
      - "packages/jetbrains-plugin/**"
      - ".github/workflows/ide-extensions.yml"
  workflow_dispatch:
    inputs:
      publish_vscode_marketplace:
        description: >-
          Publish the packaged .vsix to the official VS Code Marketplace
          (needs VSCE_PAT). Use to backfill a version already tagged +
          published to Open VSX without retagging — the Open VSX step stays
          tag-gated so it won't re-publish (a duplicate version would fail).
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  vscode:
    name: VS Code extension (package + publish)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/vscode-extension
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      # The extension has no runtime npm deps — package straight to a .vsix.
      - name: Package .vsix
        run: npx --yes @vscode/vsce@latest package --no-dependencies --out chainlesschain-ide.vsix

      # Parse gate: a .vsix is a ZIP — crack it open (dependency-free reader
      # in the script) and assert the marketplace metadata is coherent before
      # the artifact is uploaded or any publish step can run: publisher/name/
      # version match package.json, engines/repository/icon/README/LICENSE/
      # main all packed, and extension.vsixmanifest Identity agrees. The
      # selftest exercises the reader + assertion core against a synthetic
      # zip first, so a broken verifier can't green-light a broken package.
      - name: Verify .vsix metadata
        run: |
          node scripts/verify-vsix.selftest.mjs
          node scripts/verify-vsix.mjs chainlesschain-ide.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v6
        with:
          name: chainlesschain-ide-vscode
          path: packages/vscode-extension/chainlesschain-ide.vsix
          if-no-files-found: error

      # Open VSX is the primary channel (Cursor / VSCodium / Gitpod / ...). The
      # namespace + token are 'chainlesschain' / OVSX_PAT (see
      # docs/internal/ide-extensions-releasing.md).
      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/ide-vscode-v')
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT secret is not set — cannot publish to Open VSX."
            exit 1
          fi
          npx --yes ovsx@latest create-namespace chainlesschain || true
          npx --yes ovsx@latest publish chainlesschain-ide.vsix

      # Official VS Code Marketplace — optional; needs a VSCE_PAT secret (an
      # Azure DevOps PAT, org "All accessible organizations", scope
      # Marketplace→Manage; the org itself is free) + the `chainlesschain`
      # publisher on marketplace.visualstudio.com/manage. On a release tag a
      # missing secret skips gracefully so the Open VSX publish still counts;
      # an explicit workflow_dispatch backfill fails loudly instead.
      - name: Publish to VS Code Marketplace (optional)
        if: >-
          startsWith(github.ref, 'refs/tags/ide-vscode-v') ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_vscode_marketplace)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::VSCE_PAT secret is not set — cannot publish to the official Marketplace."
              exit 1
            fi
            echo "::notice::VSCE_PAT not set — skipping official Marketplace (Open VSX already published)."
            exit 0
          fi
          npx --yes @vscode/vsce@latest verify-pat chainlesschain -p "$VSCE_PAT"
          npx --yes @vscode/vsce@latest publish --no-dependencies --packagePath chainlesschain-ide.vsix -p "$VSCE_PAT"

  jetbrains:
    name: JetBrains plugin (build + publish)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/jetbrains-plugin
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Pure-core regression gate: 300+ assertions over the vscode-parity pure
      # layers (PureLogicSmokeMain exits 1 on any failure). Runs before the
      # full build so a logic regression fails fast.
      - name: Pure-logic smoke (smokeTest)
        run: ./gradlew smokeTest --no-daemon --stacktrace

      # Real JUnit 5 over the pure com.chainlesschain.ide.* layer (per-test
      # isolation + JUnit XML). No IntelliJ platform test framework, so it runs
      # headless in seconds. Complements the aggregate smokeTest gate above.
      - name: Unit tests (JUnit)
        run: ./gradlew test --no-daemon --stacktrace

      # Downloads the IntelliJ Platform SDK + builds the signed-able plugin zip.
      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon --stacktrace

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: chainlesschain-ide-jetbrains
          path: packages/jetbrains-plugin/build/distributions/*.zip
          if-no-files-found: error

      - name: Publish to JetBrains Marketplace
        if: startsWith(github.ref, 'refs/tags/ide-jetbrains-v')
        env:
          JETBRAINS_PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$JETBRAINS_PUBLISH_TOKEN" ]; then
            echo "::error::JETBRAINS_PUBLISH_TOKEN secret is not set — cannot publish."
            exit 1
          fi
          ./gradlew publishPlugin --no-daemon --stacktrace
