name: Sidebar Coverage Audit (PR advisory)

# Advisory gate: when a PR adds/modifies docs/design/**/*.md, runs
# scripts/lint-sidebar-coverage.mjs to check whether new docs have a sidebar
# entry in docs-site/docs/.vitepress/config.js or docs-site-design/'s config.
# Comments on the PR with a list of unwired docs (those reachable only by
# URL). Does NOT block merge — sidebar is UX, and the project has a
# pre-existing backlog of unwired docs.
#
# Why: sync scripts publish .md files automatically, but sidebar JS is
# manual — a new design doc can land on main with zero discoverability.
# This surfaces the gap at PR time so the author can wire it deliberately
# (or accept the trade-off explicitly).
#
# See: scripts/lint-sidebar-coverage.mjs

on:
  pull_request:
    paths:
      - 'docs/design/**'
      - 'docs-site/docs/.vitepress/config.js'
      - 'docs-site-design/docs/.vitepress/config.js'
      - 'scripts/lint-sidebar-coverage.mjs'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sidebar-coverage-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run sidebar coverage lint
        id: lint
        run: |
          node scripts/lint-sidebar-coverage.mjs 2>&1 | tee /tmp/sidebar.log
          # Capture the missing count for the comment step.
          MISSING=$(grep -oE '⚠ [0-9]+ source doc' /tmp/sidebar.log | grep -oE '[0-9]+' || echo "0")
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"

      - name: Comment on PR if unwired docs exist
        if: steps.lint.outputs.missing != '0' && steps.lint.outputs.missing != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- sidebar-coverage-audit-comment-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const missing = '${{ steps.lint.outputs.missing }}';

            function tail(path, n) {
              try {
                const lines = fs.readFileSync(path, 'utf-8').split('\n');
                return lines.slice(-n).join('\n');
              } catch { return '(log unavailable)'; }
            }

            const body = [
              marker,
              `## ⚠️ Sidebar Coverage Audit — ${missing} unwired design doc(s)`,
              '',
              `This PR touched \`docs/design/**\`. After sync, ${missing} source doc(s) under`,
              '`docs/design/` have **no sidebar entry** in either VitePress config — published',
              'but reachable only by URL.',
              '',
              '### Fix',
              '',
              'Add `{ text: "...", link: "/design/<slug>" }` (or `/design/modules/<slug>`)',
              'entries in:',
              '- `docs-site/docs/.vitepress/config.js`',
              '- `docs-site-design/docs/.vitepress/config.js`',
              '',
              'Both configs maintain sidebars independently. Slug = the ASCII filename from',
              '`docs/design/_filename-map.json` (drop `.md`).',
              '',
              '### Unwired docs (excerpt)',
              '',
              '```',
              tail('/tmp/sidebar.log', 40),
              '```',
              '',
              `Run log: ${runUrl}`,
              '',
              '_Advisory only — does not block merge. The project has a pre-existing backlog;',
              'wire deliberately or accept the trade-off explicitly._',
              '_Auto-generated by `.github/workflows/sidebar-coverage-audit.yml`._'
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
