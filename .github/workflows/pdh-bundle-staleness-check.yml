name: PDH Bundle Staleness Check (hard gate, traps #27 + #28)

# Catches two silent-failure modes at PR time:
#
#   trap #27 — USR_VERSION sentinel cache: changing
#   packages/personal-data-hub/lib/** or packages/cli/lib/** without bumping
#   android-app/feature-local-terminal/build.gradle.kts USR_VERSION makes
#   LocalFilesystemBootstrapper skip re-extraction. Device runs stale code
#   after install. See memory android_usr_version_sentinel_cache.md.
#
#   trap #28 — workspace dep stale: changing the same lib trees without
#   bumping packages/personal-data-hub/package.json version + syncing the
#   matching dep in packages/cli/package.json makes node-runtime-bundle.yml
#   pull the OLD pinned version from the npm registry. The lib changes never
#   reach cc-cli.tgz on the device. See memory
#   pdh_workspace_dep_npm_publish_stale.md.
#
# Both are PR-time gates. The npm-registry-availability job is advisory
# (continue-on-error) because publish happens AFTER merge via npm-publish.yml,
# so a PR check for the new version will normally show "not found" until
# merge + publish — but if the publish was forgotten outright, this job
# leaves a visible trace.
#
# Mirrors the structure of .github/workflows/android-release-precheck.yml
# (mandatory + advisory pattern landed for trap #19 on 2026-05-26).
#
# See:
#   docs/internal/hidden-risk-traps.md (#27, #28)
#   scripts/lint-pdh-bundle-staleness.mjs

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'packages/personal-data-hub/**'
      - 'packages/cli/**'
      - 'android-app/feature-local-terminal/build.gradle.kts'
      - 'scripts/lint-pdh-bundle-staleness.mjs'
      - 'scripts/__tests__/lint-pdh-bundle-staleness.test.mjs'
      - '.github/workflows/pdh-bundle-staleness-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pdh-bundle-staleness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect PDH/CLI lib changes
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      pdh-lib-changed: ${{ steps.filter.outputs.pdh-lib }}
      cli-lib-changed: ${{ steps.filter.outputs.cli-lib }}
      relevant: ${{ steps.filter.outputs.pdh-lib == 'true' || steps.filter.outputs.cli-lib == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            pdh-lib:
              - 'packages/personal-data-hub/lib/**'
            cli-lib:
              - 'packages/cli/lib/**'

  unit-tests:
    name: Lint script unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run lint-pdh-bundle-staleness unit tests
        run: node --test scripts/__tests__/lint-pdh-bundle-staleness.test.mjs

  usr-version-bump-check:
    name: USR_VERSION bump check (trap #27, mandatory)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Ensure base ref is fetched
        run: |
          # fetch-depth: 0 above gives full history, but be explicit so the
          # diff is reproducible even if defaults change.
          git fetch --no-tags --depth=1 origin ${{ github.base_ref }}

      - name: Check USR_VERSION bumped vs base
        run: |
          node scripts/lint-pdh-bundle-staleness.mjs \
            --base=origin/${{ github.base_ref }} \
            --check=usr-version

      - name: Failure summary
        if: failure()
        run: |
          {
            echo "## ❌ Trap #27: USR_VERSION not bumped"
            echo ""
            echo "You changed code under \`packages/personal-data-hub/lib/**\` or"
            echo "\`packages/cli/lib/**\`, but \`android-app/feature-local-terminal/build.gradle.kts\`"
            echo "USR_VERSION is unchanged. On the device, LocalFilesystemBootstrapper"
            echo "compares this string against \`\$PREFIX/.bootstrap_version\` and SKIPS"
            echo "re-extraction when they match. Your lib changes will not reach the"
            echo "Android cc subprocess."
            echo ""
            echo "**Fix:**"
            echo "1. Bump \`buildConfigField(\"String\", \"USR_VERSION\", \"\\\"N\\\"\")\` → \`N+1\` (single monotonic integer string; do NOT use semver or git SHA)."
            echo "2. Rebuild APK."
            echo "3. Reinstall on device."
            echo "4. Verify with: \`adb logcat -s LocalFilesystemBootstrapper:* | grep -i extract\` — should see \`Bootstrap version mismatch: device=N-1 target=N, re-extracting\`."
            echo ""
            echo "See: \`docs/internal/hidden-risk-traps.md\` #27, memory \`android_usr_version_sentinel_cache.md\`."
          } >> "$GITHUB_STEP_SUMMARY"

  workspace-version-bump-check:
    name: Workspace dep version bump (trap #28, mandatory)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    outputs:
      pdh-version: ${{ steps.read.outputs.pdh-version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Ensure base ref is fetched
        run: |
          git fetch --no-tags --depth=1 origin ${{ github.base_ref }}

      - name: Check workspace version sync
        run: |
          node scripts/lint-pdh-bundle-staleness.mjs \
            --base=origin/${{ github.base_ref }} \
            --check=workspace-version

      - name: Read HEAD PDH version for downstream registry probe
        id: read
        run: |
          v=$(node -p "require('./packages/personal-data-hub/package.json').version")
          echo "pdh-version=$v" >> "$GITHUB_OUTPUT"
          echo "HEAD @chainlesschain/personal-data-hub version: $v"

      - name: Failure summary
        if: failure()
        run: |
          {
            echo "## ❌ Trap #28: workspace dep stale"
            echo ""
            echo "You changed code under \`packages/personal-data-hub/lib/**\` but one of:"
            echo "- \`packages/personal-data-hub/package.json\` \`version\` was not bumped, or"
            echo "- \`packages/cli/package.json\` dep \`@chainlesschain/personal-data-hub\` was not synced to the new version."
            echo ""
            echo "\`.github/workflows/node-runtime-bundle.yml\` runs \`npm install\` and pulls"
            echo "the PINNED \`@chainlesschain/*\` versions from the npm registry. Without a"
            echo "version bump + publish, \`cc-cli.tgz\` ships the OLD library code regardless"
            echo "of what your PR changes in the git tree."
            echo ""
            echo "**Fix (4 steps, all required):**"
            echo "1. Bump \`packages/personal-data-hub/package.json\` \`version\` (semver patch is typical)."
            echo "2. Sync \`packages/cli/package.json\` dep \`@chainlesschain/personal-data-hub\` to the new version."
            echo "3. After merge: \`gh workflow run npm-publish.yml\` — wait ~8–10 min for registry publish."
            echo "4. \`gh workflow run \"Node.js Runtime Bundle (Termux)\"\` — rebuilds \`cc-cli.tgz\` from the registry."
            echo ""
            echo "Then bump \`USR_VERSION\` per trap #27 + rebuild + install."
            echo ""
            echo "See: \`docs/internal/hidden-risk-traps.md\` #28, memory \`pdh_workspace_dep_npm_publish_stale.md\`."
          } >> "$GITHUB_STEP_SUMMARY"

  npm-registry-availability-check:
    name: npm registry availability (trap #28, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [ detect-changes, workspace-version-bump-check ]
    if: needs.detect-changes.outputs.relevant == 'true'
    continue-on-error: true
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Probe npm registry for HEAD PDH version
        id: probe
        env:
          PDH_VERSION: ${{ needs.workspace-version-bump-check.outputs.pdh-version }}
        run: |
          set +e
          PUBLISHED=$(npm view "@chainlesschain/personal-data-hub@${PDH_VERSION}" version 2>/dev/null)
          set -e
          if [ -n "$PUBLISHED" ]; then
            echo "✓ @chainlesschain/personal-data-hub@${PDH_VERSION} is on the registry."
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::@chainlesschain/personal-data-hub@${PDH_VERSION} not yet on npm registry."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Notify on missing registry version (advisory)
        if: steps.probe.outputs.available != 'true'
        run: |
          {
            echo "## ⚠️ Advisory: PDH version not yet on npm registry"
            echo ""
            echo "Version \`${{ needs.workspace-version-bump-check.outputs.pdh-version }}\`"
            echo "of \`@chainlesschain/personal-data-hub\` is not on the npm registry yet."
            echo ""
            echo "This is **expected** at PR time — \`npm-publish.yml\` runs AFTER merge."
            echo "Posting as a reminder: after merging, run \`gh workflow run npm-publish.yml\`"
            echo "and confirm with \`npm view @chainlesschain/personal-data-hub@<version> version\`."
            echo ""
            echo "**Release order** (memory \`release_order_npm_before_release_pkg\`):"
            echo "1. npm publish first."
            echo "2. \`Node.js Runtime Bundle (Termux)\` re-pack cc-cli.tgz."
            echo "3. THEN bump USR_VERSION + create the Android release tag."
            echo ""
            echo "Inverting this order ships stale code to users."
          } >> "$GITHUB_STEP_SUMMARY"
