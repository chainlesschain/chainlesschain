name: CI Mask Audit (PR advisory)

# Advisory gate: when a PR modifies .github/workflows/, scan newly added lines
# for the 4 CI false-green mask patterns (continue-on-error / || true / xcpretty
# / hardcoded ✅). On hit, post a comment to the PR. Does NOT block merge —
# reviewer applies judgment matrix from memory feedback_ci_false_green_audit_checklist.md.
#
# Why: 2026-05-18 audit found 6+ workflows with false-green masks that hid
# regressions (iOS 412 errors, npm-publish broken for months, etc). The audit
# is a one-time sweep — new PRs adding workflow changes can re-introduce same
# patterns. This workflow gates that re-introduction.

on:
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/workflows/**.yaml'
      - 'scripts/audit-ci-masks.sh'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-mask-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # need full history to diff vs base

      - name: Run CI mask audit
        id: audit
        continue-on-error: true  # advisory: comment on hit, don't block merge
        run: |
          bash scripts/audit-ci-masks.sh origin/${{ github.base_ref }}

      - name: Comment on PR if mask detected
        if: steps.audit.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-mask-audit-comment-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              '## ⚠️ CI Mask Audit — patterns detected in workflow diff',
              '',
              `This PR's changes to \`.github/workflows/\` add lines matching one or more known false-green mask patterns:`,
              '',
              '- `continue-on-error: true`',
              '- `|| true` (run-block mask)',
              '- `xcpretty` (silent-drops xcodebuild errors)',
              '- Hardcoded ✅ in pwsh/cmd `Write-Host` / `Write-Output`',
              '',
              `**Run locally to see hits:** \`bash scripts/audit-ci-masks.sh origin/${context.payload.pull_request.base.ref}\``,
              '',
              '### Reviewer judgment matrix',
              '',
              '| Pattern + context | Risk | Action |',
              '|---|---|---|',
              '| Lint / jacoco / probe / cleanup | LOW | Likely OK, document in whitelist |',
              '| `continue-on-error` on test step + PR comment hardcoded ✅ | **CRITICAL** | Drop mask + use `${{ steps.X.outcome }}` |',
              '| `\\|\\| true` before publish/deploy | **CRITICAL** | Drop, add `set -e` |',
              '| `xcpretty` after xcodebuild | MEDIUM | Rewrite to `2>&1 \\| tee log` + upload-artifact |',
              '',
              `See [memory \`feedback_ci_false_green_audit_checklist.md\`](../wiki) for full whitelist + Pattern A/B/C fix recipes.`,
              '',
              `Audit run log: ${runUrl}`,
              '',
              '_Advisory only — does not block merge. Auto-generated by `.github/workflows/ci-mask-audit.yml`._'
            ].join('\n');

            // Upsert: find existing comment with our marker → update; else create
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
              console.log(`Updated comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
              console.log('Created new audit comment');
            }

      - name: Log clean audit
        if: steps.audit.outcome == 'success'
        run: |
          echo "✅ CI mask audit clean — no new false-green patterns in workflow diff."
