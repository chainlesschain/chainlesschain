name: Doc Sync Generated-Copy Gate (PR mandatory)

# Mandatory gate: rejects PRs that modify docs-site/docs/design/** or
# docs-site-design/docs/** (except whitelisted index.md / .vitepress/).
#
# These paths are *generated copies* synced from docs/design/**/*.md by:
#   - docs-site/scripts/sync-design-docs.js
#   - docs-site-design/scripts/sync-docs.js
#
# Editing a copy directly is silently overwritten on next sync run. The
# pre-commit hook (.husky/pre-commit step 0.5) already blocks this locally,
# but two escape paths still reach main without it:
#   1. `git commit --no-verify` (or commit on machine without husky)
#   2. PR opened from a fork / CI-built commit
#
# Trap #6 in docs/internal/hidden-risk-traps.md.
# Pairs with doc-sync-audit.yml (advisory, catches unmapped CJK names).

on:
  pull_request:
    paths:
      - 'docs-site/docs/design/**'
      - 'docs-site-design/docs/**'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: doc-sync-generated-copy-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect direct edits to generated copies
        id: detect
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          # Files added/modified/renamed under the two generated trees,
          # excluding the per-site whitelist (index.md and .vitepress/).
          OFFENDERS=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^(docs-site/docs/design/|docs-site-design/docs/)' \
            | grep -v -E '(^|/)index\.md$' \
            | grep -v -E '(^|/)\.vitepress/' \
            || true)

          if [ -n "$OFFENDERS" ]; then
            echo "::error::PR edits docs-site generated copies directly. See PR comment for fix."
            echo "$OFFENDERS"
            {
              echo 'offenders<<EOF'
              echo "$OFFENDERS"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "✅ No edits to generated copies."

      - name: Comment on PR with fix instructions
        if: failure() && steps.detect.outputs.offenders != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- doc-sync-generated-copy-gate-v1 -->';
            const offenders = `${{ steps.detect.outputs.offenders }}`.trim().split('\n').filter(Boolean);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              '## ❌ Doc Sync Gate — generated copy edited directly',
              '',
              'This PR modifies files under `docs-site/docs/design/**` or `docs-site-design/docs/**`,',
              'but those are **auto-generated copies**, not source files. The next time the sync',
              'scripts run, your edits will be silently overwritten.',
              '',
              '### Offending files',
              '',
              '```',
              offenders.join('\n'),
              '```',
              '',
              '### Fix',
              '',
              '1. Find the real source under `docs/design/**/*.md` (project root, git tracked).',
              '   For Chinese-named files, check `docs/design/_filename-map.json`.',
              '2. Edit the source there.',
              '3. Run the sync scripts locally:',
              '   ```bash',
              '   node docs-site/scripts/sync-design-docs.js',
              '   node docs-site-design/scripts/sync-docs.js',
              '   ```',
              '4. `git add` both the source and the refreshed copies, push the new commit.',
              '',
              '### Why this is mandatory (not advisory)',
              '',
              'The pre-commit hook (`.husky/pre-commit` step 0.5) catches this locally, but',
              'commits authored with `--no-verify`, or from environments without husky, can',
              'still land on a PR. This gate is the CI-level backstop.',
              '',
              'Whitelisted (allowed): `index.md` and `.vitepress/**` (each site self-manages).',
              '',
              `Run log: ${runUrl}`,
              '',
              '_Trap #6 in `docs/internal/hidden-risk-traps.md`. Auto-generated by `.github/workflows/doc-sync-generated-copy-gate.yml`._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
