name: _CLI Test (reusable)

# Reusable workflow for the chainlesschain CLI test suite.
# Uses vitest's native --shard=k/n (file-balanced) plus a GitHub Actions matrix
# so each suite × shard runs in its own runner, in parallel.
#
# Why this exists (do not revert to the old `[a-m]*/[n-z]*` glob batches):
#   The previous strategy alphabetically split test files into two halves and
#   added --no-file-parallelism on top to keep things linear. That broke every
#   time a heavy new test landed in one half (e.g. the original
#   mtc-federation-governance-cli, ~85s/41 tests, since split into three
#   smaller files per issue #4). vitest's --shard splits files by hash → each shard is
#   ~25% of the work, balanced automatically as new tests land, AND file
#   parallelism inside the shard can come back.
#
# Required flags (DO NOT DROP):
#   --shard=k/n        balanced file split (replaces glob batching)
#   --silent=true      suppresses per-test stdout capture going over the
#                      vitest worker→main RPC pipe (60s onTaskUpdate timeout).
#                      Without this, a 4366-test shard locally exits 1 with
#                      "[vitest-worker]: Timeout calling onTaskUpdate" even
#                      though every test passes. This is standard vitest CI
#                      practice, not a workaround. Note: vitest CAC parser
#                      requires the explicit `=true` form when positional
#                      file args follow.
#   --reporter=basic   minimal reporter output (less IPC traffic)
#
# Inputs:
#   runs-on    — runner OS (default ubuntu-latest)
#   shards     — number of shards per suite (default 4; must match the matrix below)
#   include-e2e — set false to skip the e2e suite (e.g. for fast PR feedback)

on:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner OS"
        required: false
        type: string
        default: "ubuntu-latest"
      shards:
        description: "Number of shards per suite (must equal the matrix length below)"
        required: false
        type: number
        default: 4
      include-e2e:
        description: "Include the e2e suite"
        required: false
        type: boolean
        default: true

jobs:
  unit:
    name: "unit (${{ inputs.runs-on }}, shard ${{ matrix.shard }}/${{ inputs.shards }})"
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - uses: ./.github/actions/setup-node-deps
      - name: vitest unit shard ${{ matrix.shard }}/${{ inputs.shards }}
        working-directory: packages/cli
        run: npx vitest run --shard=${{ matrix.shard }}/${{ inputs.shards }} --reporter=basic --silent=true __tests__/unit/

  integration:
    # Integration runs 8 shards because shard 4 (at the 4-shard layout)
    # hashed to a combination heavy enough to push wall-time past the 60s
    # onTaskUpdate heartbeat on all 3 OS. 8 shards halved the per-shard
    # wall-time and the file split below removed the heaviest single file.
    #
    # Issue #4 fixed — file split + per-file pool override:
    # The original __tests__/integration/mtc-federation-governance-cli.test.js
    # (1334 lines / 41 tests / ~200s on Windows CI) was split into three
    # focused suites — *-core-cli.test.js (13 tests), *-sync-cli.test.js
    # (13 tests), *-trust-cli.test.js (15 tests) — sharing a helper
    # module under __tests__/integration/_helpers/. The split alone wasn't
    # enough on Windows: even 13 tests in the forks pool still tripped
    # vitest's hardcoded 60s birpc onTaskUpdate timeout. The real fix is
    # `poolMatchGlobs` in packages/cli/vitest.config.js routing these
    # files to `pool: threads` (singleThread), which uses worker_threads
    # postMessage instead of process IPC — no birpc heartbeat on the
    # critical path. Underlying RPC bug is fixed upstream in vitest
    # v4.0.0 (#8297); we stay on ^3.1.1 to avoid the major bump.
    name: "integration (${{ inputs.runs-on }}, shard ${{ matrix.shard }}/8)"
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - uses: ./.github/actions/setup-node-deps
      - name: vitest integration shard ${{ matrix.shard }}/8
        working-directory: packages/cli
        run: npx vitest run --shard=${{ matrix.shard }}/8 --reporter=basic --silent=true __tests__/integration/

  e2e:
    name: "e2e (${{ inputs.runs-on }}, shard ${{ matrix.shard }}/${{ inputs.shards }})"
    if: ${{ inputs.include-e2e }}
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - uses: ./.github/actions/setup-node-deps
      - name: vitest e2e shard ${{ matrix.shard }}/${{ inputs.shards }}
        working-directory: packages/cli
        run: npx vitest run --config vitest.e2e.config.js --shard=${{ matrix.shard }}/${{ inputs.shards }} --reporter=basic --silent=true __tests__/e2e/
