name: Doc Sync Audit (PR advisory)

# Advisory gate: when a PR adds/modifies docs/design/**/*.md, runs both sync
# scripts (docs-site/scripts/sync-design-docs.js + docs-site-design/scripts/
# sync-docs.js). Either throw (= unmapped Chinese-named source) → PR comment
# with the exact filename + map name to update. Does NOT block merge.
#
# Why: both sync scripts now hard-fail on unmapped CJK filenames (commit
# b39444cec, 2026-05-18, replaces silent fall-through to unknown-unmapped.md
# that previously caused multiple files to overwrite each other). But the
# throw only fires when something runs the sync — and the sync only runs at
# deploy time (tag push). A developer adding a new Chinese-named design doc
# can land on main without anyone running sync, and the breakage surfaces
# only when the next desktop release tag fires release.yml's deploy job.
#
# This workflow runs sync at PR time, surfacing the issue with a clear
# reproducer before merge. Advisory because the deploy will eventually
# catch it; this just shifts detection left.
#
# See memory docs_site_sync_unmapped_fallthrough.md.

on:
  pull_request:
    paths:
      - 'docs/design/**'
      - 'docs-site/scripts/sync-design-docs.js'
      - 'docs-site-design/scripts/sync-docs.js'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: doc-sync-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run docs-site sync (advisory)
        id: sync_a
        continue-on-error: true
        run: |
          node docs-site/scripts/sync-design-docs.js 2>&1 | tee /tmp/sync_a.log
          exit ${PIPESTATUS[0]}

      - name: Run docs-site-design sync (advisory)
        id: sync_b
        continue-on-error: true
        run: |
          node docs-site-design/scripts/sync-docs.js 2>&1 | tee /tmp/sync_b.log
          exit ${PIPESTATUS[0]}

      - name: Comment on PR if sync threw
        if: steps.sync_a.outcome == 'failure' || steps.sync_b.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- doc-sync-audit-comment-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            function tail(path, n) {
              try {
                const lines = fs.readFileSync(path, 'utf-8').split('\n');
                return lines.slice(-n).join('\n');
              } catch {
                return '(log unavailable)';
              }
            }

            const aOk = '${{ steps.sync_a.outcome }}' === 'success';
            const bOk = '${{ steps.sync_b.outcome }}' === 'success';
            const failed = [];
            if (!aOk) failed.push('`docs-site/scripts/sync-design-docs.js`');
            if (!bOk) failed.push('`docs-site-design/scripts/sync-docs.js`');

            const body = [
              marker,
              '## ⚠️ Doc Sync Audit — unmapped Chinese-named source detected',
              '',
              `This PR touches \`docs/design/**\`, and at least one doc-site sync script threw.`,
              `Failed: ${failed.join(', ')}.`,
              '',
              '### Why this matters',
              '',
              'Both sync scripts hard-fail (since commit `b39444cec`) on Chinese-named source files',
              'that aren\'t in their `ROOT_FILE_MAP` or `MODULE_FILE_MAP`. Before this fix, unmapped',
              'files silently became `unknown-unmapped.md` — multiple files would overwrite each other.',
              '',
              'You almost certainly added a new design doc with a non-ASCII filename and forgot to',
              'update the mapping in **both** sync scripts (each maintains its own map).',
              '',
              '### Fix',
              '',
              'Add an entry to both `ROOT_FILE_MAP` (or `MODULE_FILE_MAP` if under `modules/`) blocks:',
              '- `docs-site/scripts/sync-design-docs.js`',
              '- `docs-site-design/scripts/sync-docs.js`',
              '',
              'Or rename the source to ASCII-only (regex `/^[\\x20-\\x7e]+$/`).',
              '',
              '### Audit output (tails)',
              '',
              !aOk ? '<details><summary><code>sync-design-docs.js</code> stderr</summary>\n\n```\n' + tail('/tmp/sync_a.log', 20) + '\n```\n</details>' : '',
              !bOk ? '<details><summary><code>sync-docs.js</code> stderr</summary>\n\n```\n' + tail('/tmp/sync_b.log', 20) + '\n```\n</details>' : '',
              '',
              `Run log: ${runUrl}`,
              '',
              '_Advisory only — does not block merge. The release.yml deploy will fail at tag-push if this isn\'t fixed first._',
              '_Auto-generated by `.github/workflows/doc-sync-audit.yml`._'
            ].filter(Boolean).join('\n');

            // Upsert: find existing comment with our marker → update; else create
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new audit comment');
            }

      - name: Log clean audit
        if: steps.sync_a.outcome == 'success' && steps.sync_b.outcome == 'success'
        run: |
          echo "✅ Doc sync audit clean — both sync scripts completed without throwing."
