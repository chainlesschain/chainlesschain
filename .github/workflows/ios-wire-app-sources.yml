name: iOS Wire App Sources (Manual)

# 手动 dispatch 触发：在 macOS runner 上跑 ios-app/scripts/wire_app_sources.rb
# 把 22 个 Phase 1-4 swift 文件 (Pairing 7 + RemoteTerminal 6 + RemoteOperate 7
# + Notification 2) 接进 ChainlessChain.xcodeproj 的 app target Sources build
# phase。
#
# 起因：184 files in pbxproj vs 353+ swift on disk — 大量 Phase 1-4 feature 实
# 现在 git tracked 但从未 wire 进 Xcode project，所以 import CoreP2P 看得到
# CoreP2P 模块里的 RemoteCommandClient 等，但用它们的 app-level glue
# (PairingDependencies / RemoteDependencies / RemoteOperateView 等) 不编译。
# 见 memory `ios_app_target_compile_state.md`。
#
# 使用：GitHub → Actions → "iOS Wire App Sources (Manual)" → Run workflow
# - dry_run=true  (默认): 只打 diff 看效果不 commit
# - dry_run=false: 写 pbxproj + commit + push 回 main

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (only show diff, do NOT commit)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  wire-app-sources:
    name: Wire Phase 1-4 swift files into app target
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show Ruby version
        run: ruby --version

      - name: Install xcodeproj gem
        run: |
          gem install xcodeproj
          ruby -e "require 'xcodeproj'; puts 'xcodeproj gem loaded successfully'"

      - name: Run wire_app_sources.rb
        working-directory: ios-app
        run: ruby scripts/wire_app_sources.rb

      - name: Show resulting diff
        run: |
          echo "=== git status ==="
          git status --short
          echo ""
          echo "=== git diff --stat ==="
          git diff --stat
          echo ""
          echo "=== first 200 lines of pbxproj diff ==="
          git diff ios-app/ChainlessChain.xcodeproj/project.pbxproj | head -200

      - name: Sanity — pbxproj still parseable
        working-directory: ios-app
        run: |
          ruby -r xcodeproj -e "
            project = Xcodeproj::Project.open('ChainlessChain.xcodeproj')
            target = project.targets.find { |t| t.name == 'ChainlessChain' }
            count = target.source_build_phase.files.count
            puts \"✅ pbxproj parses; ChainlessChain Sources phase has #{count} files\"
          "

      - name: Commit and push (if not dry run)
        if: ${{ inputs.dry_run == false }}
        run: |
          if git diff --quiet ios-app/ChainlessChain.xcodeproj/project.pbxproj; then
            echo "::notice::pbxproj unchanged (all files already wired) — nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ios-app/ChainlessChain.xcodeproj/project.pbxproj

          git commit -m "$(cat <<'EOF'
          feat(ios): wire 22 Phase 1-4 swift files into ChainlessChain app target

          Auto-generated by .github/workflows/ios-wire-app-sources.yml — adds
          PBXFileReference + PBXBuildFile entries for the safe (real-impl with
          tests) subset of unwired feature files:

          - Pairing/ (7): PairingDependencies + IOSPairingDeviceInfoProvider +
            5 Views (Desktop / Manual / PairedDevicesList / PairingHome / Scan)
          - RemoteTerminal/ (6): RemoteDependencies + TerminalBridge JSBridge +
            4 Views (DcStatusChip / TerminalList / TerminalSession / TerminalWeb)
          - RemoteOperate/ (7): 7 Views (Clipboard / FileBrowser / Notifications
            / RemoteOperate / Screenshot / SkillTabPicker / SystemInfo)
          - Common/Services (1): PushNotificationManager+RemoteTarget extension

          Fixes ChainlessChainApp.swift cannot-find errors for PairingDependencies
          / RemoteDependencies (run 25955264590+ era).

          Run-id: ${{ github.run_id }}
          EOF
          )"

          for attempt in 1 2 3; do
            if git push origin main; then
              echo "✅ Pushed pbxproj wiring to main"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "::warning::push attempt $attempt failed, rebasing on origin/main and retrying..."
              sleep 5
              git fetch origin main
              if ! git rebase origin/main; then
                git rebase --abort || true
                echo "::error::Rebase conflict on attempt $attempt — pbxproj diverged. Re-run workflow."
                exit 1
              fi
            else
              echo "::error::push failed after 3 attempts"
              exit 1
            fi
          done

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "::notice::Dry run complete. Re-run with dry_run=false to commit pbxproj changes to main."
