name: Android Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'android-app/**'

# 2026-05-24: parallel session 每 ~10 min push 一次 → 8+ queued runs 堆积
# (see CI run 26349686684 stuck in 5th queue position 30+ min)，每个 run
# 接近 1h wall-clock 跑同样的事毫无价值。group=workflow+ref 让同分支的
# 后续 push 直接 cancel 还在 queued / in_progress 的旧 run，只保留最新一个。
# PR 用 head_ref 防 fork → upstream 冲撞自己 (push 走 ref 区分分支即可)。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (P0 + P1 DAO)
    runs-on: ubuntu-latest
    # Bumped 60 → 90 (2026-05-24): run 26347950715 hit the 1h ceiling
    # mid-artifact-upload right after :app:testDebugUnitTest ✓ passed —
    # gradle setup + 5 sub-runs (P0 + P1 + libs + core-p2p + :app) + 300+
    # test-result xml uploads no longer fit 60min on ubuntu-latest.
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      - name: Run P0 Critical Security Tests
        working-directory: android-app
        run: |
          ./gradlew :core-e2ee:testDebugUnitTest --tests "*DoubleRatchetTest*" --no-daemon
          ./gradlew :core-e2ee:testDebugUnitTest --tests "*X3DHKeyExchangeTest*" --no-daemon
          ./gradlew :core-network:testDebugUnitTest --tests "*LinkPreviewFetcherTest*" --no-daemon

      - name: Run P1 DAO Tests
        working-directory: android-app
        run: ./gradlew :core-database:testDebugUnitTest --tests "*DaoTest*" --no-daemon

      - name: Run Library Module Unit Tests (excl core-p2p)
        working-directory: android-app
        run: |
          # 7 core-* modules. --parallel runs their :testDebugUnitTest tasks concurrently
          # across projects; --max-workers=4 caps at ubuntu-latest's 4 vCPUs to avoid
          # OOM from too many concurrent test JVMs.
          # core-p2p split into its own step below to isolate the hung-test
          # diagnostic — see "Run core-p2p Unit Tests".
          ./gradlew :core-common:testDebugUnitTest :core-database:testDebugUnitTest :core-security:testDebugUnitTest \
            :core-did:testDebugUnitTest :core-e2ee:testDebugUnitTest \
            :core-blockchain:testDebugUnitTest :core-network:testDebugUnitTest \
            --parallel --max-workers=4 --no-daemon

      # core-p2p:testDebugUnitTest hung indefinitely in run 25642034234 (53 min,
      # no test output before timeout). Split out with tight timeout so the step
      # fails fast; per-test event logging is configured in core-p2p/build.gradle.kts
      # so the gradle log surfaces the specific Test class instead of going silent.
      # Once the offending test is fixed, fold this back into the step above.
      - name: Run core-p2p Unit Tests (isolated, diagnostic)
        working-directory: android-app
        timeout-minutes: 15
        run: ./gradlew :core-p2p:testDebugUnitTest --no-daemon

      # Removed continue-on-error so app-module compilation regressions
      # block the pipeline. Previous comment claimed "known compilation
      # issues in remote/ package" — if those exist, CI must surface them
      # rather than mask. Set CC_SKIP_APP_TESTS=1 in workflow inputs to
      # opt out temporarily if a real blocker lands.
      - name: Run App Module Unit Tests
        working-directory: android-app
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      # Test-report generation (no-op aggregation) stays continue-on-error
      # because failures here are typically gradle-cache transient, not
      # signals about test status (which the previous step has already
      # recorded as exit code).
      - name: Generate Test Report
        if: always()
        working-directory: android-app
        continue-on-error: true
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-results
          path: android-app/**/build/test-results/testDebugUnitTest/
          retention-days: 7

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-test-reports
          path: android-app/**/build/reports/tests/testDebugUnitTest/
          retention-days: 7

  instrumented-tests:
    name: Instrumented Tests (P1 Integration + P2 UI)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        api-level: [28, 30]
        target: [default]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run P1 Integration Tests
        continue-on-error: true  # outer advisory gate: P1 failures do not block the workflow yet
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Inner `|| true` on each gradle line was redundant masking on top
          # of `continue-on-error: true` — first failure now halts the script
          # so the step's outcome honestly reflects whether tests passed.
          script: |
            set -e
            cd android-app
            ./gradlew :core-e2ee:connectedAndroidTest --tests "*E2EEIntegrationTest*" --no-daemon
            ./gradlew :feature-p2p:connectedAndroidTest --tests "*P2PIntegrationTest*" --no-daemon
            ./gradlew :feature-ai:connectedAndroidTest --tests "*AI_RAG_IntegrationTest*" --no-daemon

      - name: Run P2 UI Component Tests
        continue-on-error: true  # outer advisory gate: P2 failures do not block the workflow yet
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -e
            cd android-app
            ./gradlew :feature-knowledge:connectedAndroidTest --tests "*KnowledgeUITest*" --no-daemon
            ./gradlew :feature-ai:connectedAndroidTest --tests "*AIConversationUITest*" --no-daemon
            ./gradlew :feature-p2p:connectedAndroidTest --tests "*SocialPostUITest*" --no-daemon
            ./gradlew :feature-project:connectedAndroidTest --tests "*ProjectEditorUITest*" --no-daemon

      - name: Upload Instrumented Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: instrumented-test-results-${{ matrix.api-level }}
          path: android-app/**/build/outputs/androidTest-results/
          retention-days: 7

      - name: Upload Instrumented Test Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: instrumented-test-reports-${{ matrix.api-level }}
          path: android-app/**/build/reports/androidTests/
          retention-days: 7

  code-coverage:
    name: Code Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      - name: Generate Coverage Report
        working-directory: android-app
        continue-on-error: true
        run: |
          # Inner `|| true` removed 2026-05-18 — was redundant masking on top
          # of `continue-on-error: true`. Step outcome now honestly reflects
          # whether test/jacoco runs succeeded (matching the sweep in 350157a46
          # for P1/P2 jobs).
          ./gradlew test --no-daemon
          ./gradlew jacocoTestReport --no-daemon

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: android-app/**/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports
          path: android-app/**/build/reports/jacoco/
          retention-days: 30

      - name: Check Coverage Thresholds
        working-directory: android-app
        run: |
          ./gradlew jacocoTestCoverageVerification --no-daemon || echo "Coverage threshold not met, but continuing..."

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, instrumented-tests, code-coverage]
    if: always()

    steps:
      - name: Download Unit Test Results
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: unit-test-results
          path: test-results/unit

      - name: Download Instrumented Test Results (API 28)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: instrumented-test-results-28
          path: test-results/instrumented-28

      - name: Download Instrumented Test Results (API 30)
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: instrumented-test-results-30
          path: test-results/instrumented-30

      - name: Publish Test Summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results/**/*.xml
          check_name: Test Results Summary
          comment_mode: always

      - name: Create Test Badge
        run: |
          echo "Creating test status badge..."
          # Badge creation logic here

  lint-and-detekt:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        working-directory: android-app
        run: chmod +x gradlew

      - name: Run Lint
        working-directory: android-app
        continue-on-error: true
        run: ./gradlew lintDebug --no-daemon

      - name: Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-results
          path: android-app/**/build/reports/lint-results-*.html
          retention-days: 7

      - name: Run Detekt (if configured)
        working-directory: android-app
        continue-on-error: true
        run: ./gradlew detekt --no-daemon || echo "Detekt not configured"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Dependency Check
        working-directory: android-app
        run: |
          echo "Running OWASP Dependency Check..."
          # Add dependency check commands here

      - name: Run Security Audit
        run: |
          echo "Checking for security vulnerabilities..."
          # Add security audit commands here

  build-status:
    name: Build Status Check
    runs-on: ubuntu-latest
    needs: [unit-tests, instrumented-tests, code-coverage, lint-and-detekt]
    if: always()

    steps:
      - name: Check Build Status
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Instrumented Tests: ${{ needs.instrumented-tests.result }}"
          echo "Code Coverage: ${{ needs.code-coverage.result }}"
          echo "Lint: ${{ needs.lint-and-detekt.result }}"

          # Unit tests: hard-fail. App-module continue-on-error was removed
          # in this commit, so a real test failure now propagates here.
          if [[ "${{ needs.unit-tests.result }}" == "failure" ]]; then
            echo "❌ Unit tests failed!"
            exit 1
          fi

          # Instrumented tests: soft signal. Emulator runs are flaky on
          # GH runners (KVM availability, AVD snapshot cache misses), so
          # we don't fail the build on instrumented failures yet — but we
          # DO report them visibly here so the test-summary PR comment is
          # accurate. Track via the test-results artifact for triage.
          if [[ "${{ needs.instrumented-tests.result }}" == "failure" ]]; then
            echo "⚠️ Instrumented tests failed — see uploaded test-results artifact"
          fi

          if [[ "${{ needs.unit-tests.result }}" == "success" ]]; then
            echo "✅ Unit tests passed"
            exit 0
          fi

          echo "⚠️ Some jobs were skipped or cancelled"
          exit 0

      - name: Post Status to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Test Results Summary')
            );

            // 2026-05-18 audit: prefix-✅ icons were hardcoded regardless of
            // job outcome (the result interpolated alongside told the truth,
            // but the ✅ in front made every line look like a pass). Switched
            // to a mark() helper that renders the icon from the actual result.
            // Also dropped the hardcoded "269+ tests" / "~87%" literal claims —
            // those numbers are stale snapshots, not measurements of this run.
            const mark = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : s === 'cancelled' ? '🚫' : '❌';
            const unit = '${{ needs.unit-tests.result }}';
            const instr = '${{ needs.instrumented-tests.result }}';
            const cov = '${{ needs.code-coverage.result }}';
            const lint = '${{ needs.lint-and-detekt.result }}';
            const overall = (unit === 'success' && instr === 'success') ? '✅ PASSED' : '❌ FAILED';
            const body = `## 🧪 Test Results Summary

            - ${mark(unit)} Unit Tests: \`${unit}\`
            - ${mark(instr)} Instrumented Tests: \`${instr}\`
            - ${mark(cov)} Code Coverage: \`${cov}\`
            - ${mark(lint)} Lint: \`${lint}\`

            **Status**: ${overall}
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
