name: Version Sync Gate (PR mandatory)

# Mandatory gate: every PR that touches a version-bearing surface must
# leave package.json.productVersion (SoT) in sync with all derived
# surfaces (desktop / iOS plist / Android gradle).
#
# Background: scripts/check-version-sync.js has been wired into
# .husky/pre-push since the v5.0.3.37 desktop-version-stuck-at-1.1.2
# incident. But pre-push is escapable via `--no-verify`, and contributors
# without husky installed (fork PRs, fresh CI builds) can land mismatches.
# In-app auto-updater compares stored version to the manifest version —
# any drift makes the updater silently fail to offer updates.
#
# This gate runs the same script at PR time, mandatory, no escape.
#
# Independent tracks (CLI alpha track, monorepo aggregate) are
# reported informationally and do not fail the gate.

on:
  pull_request:
    paths:
      - 'package.json'
      - 'desktop-app-vue/package.json'
      - 'ios-app/ChainlessChain/Resources/Info.plist'
      - 'android-app/app/build.gradle.kts'
      - 'scripts/check-version-sync.js'
      - '.github/workflows/version-sync-gate.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: version-sync-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run version sync check
        id: check
        run: node scripts/check-version-sync.js | tee /tmp/version-sync.log

      - name: Comment on PR with mismatch details
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- version-sync-gate-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let log = '(log unavailable)';
            try {
              log = fs.readFileSync('/tmp/version-sync.log', 'utf-8').split('\n').slice(-30).join('\n');
            } catch {}

            const body = [
              marker,
              '## ❌ Version Sync Gate — productVersion / derived surfaces out of sync',
              '',
              'This PR touches a version-bearing file but `package.json.productVersion`',
              '(the SoT) and at least one derived surface are not aligned.',
              '',
              '### Enforced surfaces',
              '',
              '- `desktop-app-vue/package.json.version` — must equal `X.Y.Z-alpha.N`',
              '- `ios-app/.../Info.plist` `CFBundleShortVersionString` — must equal `X.Y.Z`',
              '- `ios-app/.../Info.plist` `CFBundleVersion` — must equal `N`',
              '- `android-app/app/build.gradle.kts` `versionName` — must equal `X.Y.Z.N`',
              '- `android-app/app/build.gradle.kts` `versionCode` — must equal `M*100000 + m*10000 + p*1000 + b`',
              '',
              '### Why this is mandatory',
              '',
              'The desktop electron-updater and the Android UpdateChecker both compare',
              'the locally-installed version to the release manifest. Any drift silently',
              'breaks in-app auto-updates — users on the old version never see the new',
              'release.',
              '',
              '`.husky/pre-push` catches this locally, but commits authored with',
              '`--no-verify` or from environments without husky (fork PRs, fresh CI',
              'builds) can still land mismatches. This gate is the backstop.',
              '',
              '### Check output (tail)',
              '',
              '```',
              log,
              '```',
              '',
              '### Fix',
              '',
              '1. Decide the target `productVersion` (e.g. `v5.0.3.99`).',
              '2. Bump `package.json.productVersion` to that value.',
              '3. Run `node scripts/check-version-sync.js` locally to see what derived',
              '   surfaces need updating.',
              '4. Update the derived surfaces (use the expected values it prints).',
              '5. Re-run the script — should print `✓ All enforced surfaces in sync`.',
              '6. Push.',
              '',
              `Run log: ${runUrl}`,
              '',
              '_Auto-generated by `.github/workflows/version-sync-gate.yml`._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Delete prior failure comment on clean run
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- version-sync-gate-v1 -->';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
