# Maven Package — DISABLED 2026-05-18.
#
# Originally published backend/project-service to GitHub Packages on every
# `release: created`. The `mvn deploy` step had `continue-on-error: true`,
# meaning a failed deploy silently marked the workflow green and the
# package never reached the registry. Java backend (backend/project-service)
# has shown no active development in months — CLAUDE.local.md tracks
# desktop / iOS / CLI work only — so the workflow was publishing nothing
# of consequence while pretending to succeed.
#
# To re-enable: restore the `on: release` trigger, remove
# `continue-on-error: true` from the publish step (per
# feedback_ci_false_green_audit_checklist.md Pattern B), and verify the
# pom.xml `distributionManagement` block + GITHUB_TOKEN permissions still
# work. Test via `workflow_dispatch` first.

name: Maven Package

on:
  workflow_dispatch:  # disabled — manual-only, see header comment above

jobs:
  build:
    if: false  # disabled — see header comment above

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build with Maven
      working-directory: backend/project-service
      run: mvn -B package -DskipTests

    - name: Publish to GitHub Packages Apache Maven
      working-directory: backend/project-service
      run: mvn deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
