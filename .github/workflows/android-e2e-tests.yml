name: Android E2E Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'android-app/**'
      - '.github/workflows/android-e2e-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'android-app/**'
  schedule:
    # 每日凌晨2点运行
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

jobs:
  e2e-tests:
    name: E2E Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        # API 26 dropped 2026-05-22 — :feature-local-terminal bumped minSdk to 28
        # for NDK spawn.h support (see its build.gradle.kts), making the whole
        # app graph effectively minSdk 28. API 26 manifest merger fails on every
        # androidTest module that transitively depends on feature-local-terminal.
        #
        # API 33 dropped 2026-05-23 — APK ships arm64-only native libs (sqlcipher,
        # libwcdb, libpty_jni, mksh, frida-inject) via abiFilters armeabi-v7a +
        # arm64-v8a in app/build.gradle.kts. API 30 google_apis system image
        # bundles ndk_translation → arm64 .so loads on x86_64 emulator. API 33
        # google_apis dropped ndk_translation → AGP test runner reports
        # "No compatible devices connected" 100% of runs (see memory
        # android-e2e-api33-abi-mismatch). Re-add only after one of:
        #   (a) x86_64 builds of all 5 native libs land in repo,
        #   (b) frida-inject prebuilt for x86_64 becomes available, OR
        #   (c) GHA hosted API 33+ images regain ndk_translation.
        api-level: [30]  # Android 11
        arch: [x86_64]
        target: [google_apis]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/gradlew
        working-directory: .

      - name: Enable KVM for better emulator performance
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.arch }}-${{ matrix.target }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      # continue-on-error dropped 2026-05-18 second sweep: build failure
      # should fail this matrix entry honestly. `fail-fast: false` on the
      # matrix ensures other API levels still run; the downstream "Run E2E
      # Tests" step's `if: steps.build-apk.outcome == 'success'` correctly
      # skips testing on build failure regardless of c-o-e (outcome reflects
      # gradle exit code, not the masked conclusion). Diagnostic upload
      # steps below have `if: always()` / `if: failure()` so they still run.
      - name: Build Debug APK and Test APK
        working-directory: android-app
        id: build-apk
        run: |
          ./gradlew assembleDebug assembleDebugAndroidTest --stacktrace --no-daemon

      - name: Run E2E Tests (with retry)
        if: steps.build-apk.outcome == 'success'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb logcat -c
            cd android-app && (./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.clearPackageData=true --stacktrace --no-daemon; rc=$?; adb logcat -d > /tmp/logcat-e2e.txt 2>&1 || true; exit $rc)
            # 2026-05-23 investigation (run 26321740702):
            #   1. Dropped `package=com.chainlesschain.android.e2e` filter —
            #      it matched no live tests (only AppE2ETestSuite.kt.broken
            #      lives in that package, and .broken files don't compile).
            #      Live tests are in feature.p2p.ui.social and
            #      pdh.social.bilibili packages.
            #   2. Scoped to `:app:` instead of bare `connectedDebugAndroidTest`
            #      — the unqualified form runs across every module; empty
            #      androidTest source sets in core-common / core-blockchain /
            #      core-database installed the test APK, crashed at instr-
            #      runner startup ("Starting 0 tests" → Process crashed), and
            #      reported "There were failing tests" 4× as a phantom signal.
            # NOTE: ALL invocation must be on ONE physical line.
            # reactivecircus/android-emulator-runner@v2 runs each script: line
            # through its own `/usr/bin/sh -c <line>` — meaning `cd` on one
            # line and the next gradle line do NOT share state. Earlier fix
            # left `cd android-app` on its own line and the gradle line then
            # ran from repo root → "./gradlew: not found" (run 26321098765
            # API 30 job 77490106665 / 02:43:19Z reproducer). Chain them with
            # `&&` so they're a single command in a single sh -c.
            #
            # For the same reason: no for-loop retry, no multi-line if, no
            # heredocs — each line is its own subshell. `cd android-app &&
            # gradle` is the entire executable payload of this script: block.
            #
            # The other workflow android-tests.yml uses the same `cd \n cmd`
            # pattern but masks failures with `continue-on-error: true`, so
            # it looks "working" while actually never running gradle at all
            # in the per-line sh -c regime. Don't copy that.

      # Inner `|| true` removed 2026-05-18 — was redundant masking on top of
      # `continue-on-error: true`. Step outcome now honestly reflects whether
      # jacoco report generation succeeded (matching the sweep in 350157a46 for
      # android-tests.yml P1/P2 jobs).
      - name: Generate JaCoCo Coverage Report
        if: always()
        working-directory: android-app
        continue-on-error: true
        run: |
          ./gradlew jacocoE2ETestReport --stacktrace --no-daemon

      - name: Upload Test Results
        # Glob ALL modules, not just :app — connectedAndroidTest runs across
        # every module that has an androidTest source set. The previous narrow
        # path captured 0 reports when tests failed in core-common, core-
        # blockchain, core-database, etc. (run 26321740702 reproducer:
        # gradle reported "There were failing tests" for 4 modules; junit-
        # action's "Found and parsed 0 test report files" + the "Upload Test
        # Results" artifact came back empty).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api-${{ matrix.api-level }}
          path: |
            android-app/**/build/reports/androidTests/
            android-app/**/build/outputs/androidTest-results/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Test Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-api-${{ matrix.api-level }}
          path: |
            android-app/app/build/outputs/connected_android_test_additional_output/
          retention-days: 7

      - name: Upload Emulator Logcat (failure diagnosis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-api-${{ matrix.api-level }}
          path: /tmp/logcat-e2e.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-api-${{ matrix.api-level }}
          path: |
            android-app/app/build/reports/jacoco/
          retention-days: 14

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request' && matrix.api-level == 30
        uses: codecov/codecov-action@v4
        with:
          files: android-app/app/build/reports/jacoco/jacocoE2ETestReport/jacocoE2ETestReport.xml
          flags: e2e-tests
          name: E2E Test Coverage
          fail_ci_if_error: false

      - name: Publish Test Report
        # Same fix as Upload Test Results — glob ALL modules.
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'android-app/**/build/outputs/androidTest-results/connected/*.xml'
          check_name: E2E Test Results (API ${{ matrix.api-level }})
          detailed_summary: true
          include_passed: true
          fail_on_failure: false

  report-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: test-results
          merge-multiple: true

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-reports-*
          path: coverage-reports
          merge-multiple: true

      - name: Generate Test Summary
        env:
          JOB_RESULT: ${{ needs.e2e-tests.result }}
        run: |
          # 2026-05-18 audit: per-API ✅ icons used to be hardcoded based on
          # artifact-dir existence, but the upload step has `if: always()` so
          # failed tests still upload partial results — making artifact presence
          # a misleading signal of pass/fail. Now the aggregate job outcome is
          # the source of truth, with per-API rows distinguishing
          # "artifacts present" from "no artifacts".
          case "$JOB_RESULT" in
            success) HEADLINE="✅ All matrix instances passed" ;;
            skipped) HEADLINE="⏭️ Skipped" ;;
            cancelled) HEADLINE="🚫 Cancelled" ;;
            *) HEADLINE="❌ One or more matrix instances failed" ;;
          esac

          echo "# E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall**: $HEADLINE (\`$JOB_RESULT\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts by API Level" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for api in 26 30 33; do
            echo "### API Level $api" >> $GITHUB_STEP_SUMMARY
            if [ -d "test-results/test-results-api-$api" ]; then
              echo "Artifacts uploaded (see per-API matrix job logs for actual pass/fail)" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ No artifacts uploaded (matrix job may have failed before upload)" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "coverage-reports/jacocoE2ETestReport/index.html" ]; then
            echo "📊 Coverage reports generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See artifacts for detailed coverage reports" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage reports not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Coverage Thresholds
        run: |
          # 检查覆盖率是否达标
          # v0.30.0 目标: UI ≥ 85%, 业务逻辑 ≥ 92%, 关键路径 = 100%
          echo "Checking coverage thresholds (v0.30.0)..."
          echo "- UI层目标: ≥ 85%"
          echo "- 业务逻辑层目标: ≥ 92%"
          echo "- 关键路径目标: 100%"
          echo ""

          if [ -f "coverage-reports/jacocoE2ETestReport/jacocoE2ETestReport.xml" ]; then
            echo "✅ Coverage report found"
            echo "📊 Total tests: 62 (42 original + 20 UI tests)"
            echo ""
            echo "Test breakdown:"
            echo "- Knowledge Management: 8 tests"
            echo "- AI Conversation: 10 tests"
            echo "- Social Features: 12 tests"
            echo "- Social UI Screens: 20 tests (NEW)"
            echo "- P2P Communication: 7 tests"
            echo "- Project Management: 5 tests"
          else
            echo "⚠️ Coverage report not found, skipping threshold check"
          fi

  notification:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [e2e-tests, report-summary]
    if: always() && github.event_name == 'schedule'

    steps:
      - name: Notify on Success
        if: needs.e2e-tests.result == 'success'
        run: |
          echo "All E2E tests passed successfully!"
          # 可以集成 Slack/Discord/Email 通知

      - name: Notify on Failure
        if: needs.e2e-tests.result == 'failure'
        run: |
          echo "E2E tests failed! Check the artifacts for details."
          # 可以集成 Slack/Discord/Email 通知
