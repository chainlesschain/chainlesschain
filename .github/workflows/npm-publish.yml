name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.37.9). Leave empty to use package.json version."
        required: false
        type: string
      dry-run:
        description: "Dry run (npm publish --dry-run)"
        required: false
        type: boolean
        default: false
      skip_tests:
        description: "Skip tests before publishing (use when tests already passed in a prior run)"
        required: false
        type: boolean
        default: false

jobs:
  # Run tests before publishing
  test:
    if: ${{ inputs.skip_tests != true && !(github.event_name == 'push' && startsWith(github.ref_name, 'v-npm-')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.12.0"

      - name: Install root dependencies (workspaces)
        run: |
          npm install --legacy-peer-deps
          npm install @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps || true

      - name: Run core package tests
        run: |
          set -e
          echo "=== core-env tests ==="
          npm test --workspace=packages/core-env

          echo "=== shared-logger tests ==="
          npm test --workspace=packages/shared-logger

          echo "=== core-config tests ==="
          npm test --workspace=packages/core-config

          echo "=== core-db tests ==="
          npm test --workspace=packages/core-db

          echo "=== core-infra tests ==="
          npm test --workspace=packages/core-infra

          echo "=== session-core tests ==="
          npm test --workspace=packages/session-core

          echo "=== core-mtc tests ==="
          npm test --workspace=packages/core-mtc

      - name: Run Agent SDK tests
        working-directory: packages/agent-sdk
        run: |
          npm install --no-audit --no-fund
          npm run build
          npx vitest run

      - name: Run CLI tests
        working-directory: packages/cli
        run: npx vitest run

  # Publish all packages in dependency order
  publish:
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.12.0"
          registry-url: "https://registry.npmjs.org"

      - name: Install root dependencies (workspaces)
        run: |
          npm install --legacy-peer-deps
          npm install @rollup/rollup-linux-x64-gnu --no-save --legacy-peer-deps || true

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./packages/cli/package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Set publish command
        id: publish-cmd
        run: |
          if [ "${{ inputs.dry-run }}" == "true" ]; then
            echo "FLAGS=--dry-run" >> $GITHUB_OUTPUT
            echo "Mode: DRY RUN"
          else
            echo "FLAGS=--provenance --access public" >> $GITHUB_OUTPUT
            echo "Mode: LIVE PUBLISH"
          fi

      # Publish order respects dependency chain:
      # 1. core-env (no deps)
      # 2. shared-logger (-> core-env) + core-config (-> core-env)
      # 3. core-db (-> core-env, core-config)
      # 4. core-infra (-> shared-logger)
      # 5. cli (-> all above)

      - name: "Publish @chainlesschain/core-env"
        working-directory: packages/core-env
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CURRENT=$(npm view @chainlesschain/core-env version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # core-mtc has no internal deps — safe anywhere before cli
      - name: "Publish @chainlesschain/core-mtc"
        working-directory: packages/core-mtc
        run: |
          CURRENT=$(npm view @chainlesschain/core-mtc version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # core-multisig -> core-mtc (published just above), @noble/*, canonicalize.
      # Idempotent: skips when npm version already matches package.json.
      - name: "Publish @chainlesschain/core-multisig"
        working-directory: packages/core-multisig
        run: |
          CURRENT=$(npm view @chainlesschain/core-multisig version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # core-settlement -> core-mtc (published above), canonicalize. (devDep
      # core-multisig is dev-only, not needed by consumers.) Idempotent.
      - name: "Publish @chainlesschain/core-settlement"
        working-directory: packages/core-settlement
        run: |
          CURRENT=$(npm view @chainlesschain/core-settlement version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish @chainlesschain/shared-logger"
        working-directory: packages/shared-logger
        run: |
          CURRENT=$(npm view @chainlesschain/shared-logger version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish @chainlesschain/core-config"
        working-directory: packages/core-config
        run: |
          CURRENT=$(npm view @chainlesschain/core-config version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish @chainlesschain/core-db"
        working-directory: packages/core-db
        run: |
          CURRENT=$(npm view @chainlesschain/core-db version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish @chainlesschain/core-infra"
        working-directory: packages/core-infra
        run: |
          CURRENT=$(npm view @chainlesschain/core-infra version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish @chainlesschain/session-core"
        working-directory: packages/session-core
        run: |
          CURRENT=$(npm view @chainlesschain/session-core version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Agent SDK — standalone package (NOT an npm workspace member), so it
      # needs its own install; prepublishOnly runs the TypeScript dual build.
      # No consumer pins it yet (VS Code vendors the build; web-panel aliases
      # the TS source), so order relative to the CLI is free. Added 2026-07-09
      # (platform phase 3 first publish).
      - name: "Publish @chainlesschain/agent-sdk"
        working-directory: packages/agent-sdk
        run: |
          npm install --no-audit --no-fund
          CURRENT=$(npm view @chainlesschain/agent-sdk version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Personal Data Hub — must publish before CLI: CLI's package.json pins
      # a fixed version of this package, so a same-day CLI bump expects the
      # new PDH version to already be on the registry. Added 2026-05-21
      # alongside Plan A v0.1 system-data-android adapter.
      - name: "Publish @chainlesschain/personal-data-hub"
        working-directory: packages/personal-data-hub
        run: |
          CURRENT=$(npm view @chainlesschain/personal-data-hub version 2>/dev/null || echo "0.0.0")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "npm: $CURRENT | local: $PKG_VER"
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: "Publish chainlesschain (CLI)"
        working-directory: packages/cli
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CURRENT=$(npm view chainlesschain version 2>/dev/null || echo "0.0.0")
          echo "npm: $CURRENT | target: $VERSION"

          # Sync version if provided
          if [ -n "${{ inputs.version }}" ]; then
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          fi

          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "$PKG_VER" ] && [ "${{ inputs.dry-run }}" != "true" ]; then
            echo "Already published, skipping"
          else
            npm publish ${{ steps.publish-cmd.outputs.FLAGS }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          V_ENV=$(node -p "require('./packages/core-env/package.json').version")
          V_MTC=$(node -p "require('./packages/core-mtc/package.json').version")
          V_LOG=$(node -p "require('./packages/shared-logger/package.json').version")
          V_CFG=$(node -p "require('./packages/core-config/package.json').version")
          V_DB=$(node -p "require('./packages/core-db/package.json').version")
          V_INF=$(node -p "require('./packages/core-infra/package.json').version")
          V_SC=$(node -p "require('./packages/session-core/package.json').version")
          {
            echo "## Publish Summary"
            echo ""
            if [ "${{ inputs.dry-run }}" == "true" ]; then
              echo "**Mode: DRY RUN** (no packages were actually published)"
            else
              echo "**Mode: LIVE**"
            fi
            echo ""
            echo "| Package | Version |"
            echo "|---------|---------|"
            echo "| @chainlesschain/core-env | $V_ENV |"
            echo "| @chainlesschain/core-mtc | $V_MTC |"
            echo "| @chainlesschain/shared-logger | $V_LOG |"
            echo "| @chainlesschain/core-config | $V_CFG |"
            echo "| @chainlesschain/core-db | $V_DB |"
            echo "| @chainlesschain/core-infra | $V_INF |"
            echo "| @chainlesschain/session-core | $V_SC |"
            echo "| chainlesschain | $VERSION |"
          } >> $GITHUB_STEP_SUMMARY

      # Trigger npmmirror (cnpmcore) to sync each published package so its
      # tarball is cached on cdn.npmmirror.com right away. The mirror lists
      # new versions in metadata but lazily mirrors tarballs, so without an
      # explicit sync mainland-China users (whose npm defaults to
      # registry.npmmirror.com) hit E404 on tarball download — see issue #33
      # (@chainlesschain/core-infra@0.1.0 tarball missing on the mirror).
      #
      # Best-effort by design: npmjs.org is the source of truth, so a slow or
      # unreachable mirror must NOT fail the publish. Per-package outcomes are
      # surfaced to the job summary (no continue-on-error masking — trap #30).
      # cosmetic-green-ok: intentional best-effort, each result written to
      # GITHUB_STEP_SUMMARY below.
      - name: "Sync published packages to npmmirror"
        if: ${{ inputs.dry-run != true }}
        run: |
          set +e
          PKGS=(
            "@chainlesschain/core-env"
            "@chainlesschain/core-mtc"
            "@chainlesschain/shared-logger"
            "@chainlesschain/core-config"
            "@chainlesschain/core-db"
            "@chainlesschain/core-infra"
            "@chainlesschain/core-multisig"
            "@chainlesschain/core-settlement"
            "@chainlesschain/session-core"
            "@chainlesschain/personal-data-hub"
            "chainlesschain"
          )
          {
            echo "## npmmirror sync"
            echo ""
            echo "| Package | Sync request |"
            echo "|---------|--------------|"
          } >> "$GITHUB_STEP_SUMMARY"
          fail=0
          for pkg in "${PKGS[@]}"; do
            enc="${pkg//@/%40}"; enc="${enc//\//%2F}"
            code=$(curl -s -o /tmp/mirror-sync.json -w "%{http_code}" -X PUT \
              "https://registry.npmmirror.com/-/package/${enc}/syncs" \
              -H "content-type: application/json" --max-time 30)
            if [ "$code" = "201" ] || [ "$code" = "200" ]; then
              echo "  OK   $pkg (HTTP $code) -> $(cat /tmp/mirror-sync.json)"
              echo "| \`$pkg\` | ✅ queued (HTTP $code) |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "  WARN $pkg sync request returned HTTP $code (mirror will lazy-sync on first install)"
              echo "| \`$pkg\` | ⚠️ HTTP $code |" >> "$GITHUB_STEP_SUMMARY"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then
            echo "::warning::One or more npmmirror sync requests did not return 2xx (best-effort; npmjs.org is authoritative)."
          fi
          # Best-effort: never fail the publish on mirror issues.
          exit 0
