name: Code Quality & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Detect changed files for conditional job execution
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend-java: ${{ steps.filter.outputs.backend-java }}
      backend-python: ${{ steps.filter.outputs.backend-python }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend-java:
              - 'backend/project-service/**'
            backend-python:
              - 'backend/ai-service/**'

  validate-rules:
    name: Validate Coding Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            desktop-app-vue/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v2-

      - name: Install dependencies (workspace-aware)
        uses: ./.github/actions/setup-node-deps
        with:
          install-desktop-app-vue: "true"

      - name: Run Rules Validator
        working-directory: ./desktop-app-vue
        run: npm run validate:rules
        continue-on-error: false

      - name: Upload validation report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: validation-report
          path: desktop-app-vue/validation-report.txt
          retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            desktop-app-vue/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v2-

      - name: Install dependencies (workspace-aware)
        uses: ./.github/actions/setup-node-deps
        with:
          install-desktop-app-vue: "true"

      - name: Run npm audit (informational)
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Check for critical vulnerabilities
        run: |
          # Use custom audit check script that handles known unfixable vulnerabilities
          node scripts/audit-check.js --audit-level=critical

  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            desktop-app-vue/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v2-

      - name: Install dependencies (workspace-aware)
        uses: ./.github/actions/setup-node-deps
        with:
          install-desktop-app-vue: "true"

      - name: Check code style
        working-directory: ./desktop-app-vue
        # No `|| echo`: an ESLint **error** must fail the job so the required
        # "Lint & Format Check" status actually gates merges. As of 2026-06-06
        # the suite is 0 errors / ~2440 warnings — warnings don't fail eslint
        # by default, so this stays green now and only trips on new errors.
        run: npm run lint

  test-database:
    name: Database Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            desktop-app-vue/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v2-

      - name: Install dependencies (workspace-aware)
        uses: ./.github/actions/setup-node-deps
        with:
          install-desktop-app-vue: "true"

      - name: Run database tests
        working-directory: ./desktop-app-vue
        # No `|| echo` / continue-on-error: a test:db failure must fail the job so
        # the required "Database Tests" status actually gates merges. Verified
        # genuinely green in CI run 27056644357 (2026-06-06) before requiring it.
        run: npm run test:db

  build-check:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libpng-dev

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            desktop-app-vue/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-v2-

      - name: Install dependencies (workspace-aware)
        uses: ./.github/actions/setup-node-deps
        with:
          install-desktop-app-vue: "true"

      - name: Build main process
        working-directory: ./desktop-app-vue
        run: npm run build:main

      - name: Build renderer
        working-directory: ./desktop-app-vue
        run: npm run build:renderer

      - name: Check build artifacts
        working-directory: ./desktop-app-vue
        run: |
          if [ -f "dist/main/index.js" ]; then
            echo "✅ Main process build successful"
          else
            echo "❌ Main process build failed"
            exit 1
          fi

  # 后端服务检查
  backend-java-check:
    name: Java Backend Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend-java == 'true' ||
      github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Project Service
        working-directory: ./backend/project-service
        run: mvn clean compile -DskipTests
        continue-on-error: true

      - name: Run tests
        working-directory: ./backend/project-service
        run: mvn test
        continue-on-error: true

  # Python AI 服务检查
  backend-python-check:
    name: Python Backend Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.backend-python == 'true' ||
      github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: ./backend/ai-service
        run: |
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
        continue-on-error: true

      - name: Lint Python code
        run: |
          pip install flake8
          cd backend/ai-service
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        continue-on-error: true

  # 汇总报告
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [validate-rules, security-audit, build-check]
    if: always()

    steps:
      - name: Check quality gate status
        run: |
          if [ "${{ needs.validate-rules.result }}" != "success" ]; then
            echo "❌ Rules validation failed"
            exit 1
          fi

          if [ "${{ needs.security-audit.result }}" != "success" ]; then
            echo "⚠️ Security audit has warnings"
          fi

          if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "❌ Build check failed"
            exit 1
          fi

          echo "✅ Quality gate passed"
