name: Release Linux Packages

on:
  release:
    types:
      - published

jobs:
  publish-linux-builds:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        # 2026-05-27: drop package-lock.json before install to dodge
        # https://github.com/npm/cli/issues/4828 — npm 9+ writes the
        # lockfile with only the publishing platform's optional deps,
        # so a Win/macOS-generated lock omits @rollup/rollup-linux-x64-gnu
        # and `npm install` quietly skips it. Renderer build then crashes
        # with "Cannot find module @rollup/rollup-linux-x64-gnu". Removing
        # the lock forces fresh resolution that picks up the linux variant.
        # Release-only workflow → lockfile-skip is acceptable here.
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: Link hoisted modules for packaging
        run: |
          rm -rf desktop-app-vue/node_modules
          # Remove workspace self-referencing symlink to prevent ELOOP during packaging
          rm -f node_modules/chainlesschain-desktop-vue
          ln -s "$(pwd)/node_modules" desktop-app-vue/node_modules
          echo "Hoisted modules symlinked to desktop-app-vue"

      - name: Build main process
        working-directory: desktop-app-vue
        run: npm run build:main

      - name: Build renderer
        working-directory: desktop-app-vue
        run: npm run build:renderer
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Linux packages
        run: npm run make:linux --workspace=desktop-app-vue
        env:
          CHAINLESSCHAIN_DISABLE_NATIVE_DB: "1"
          SKIP_BACKEND_CHECK: "true"

      - name: Inspect generated artifacts
        run: ls -R desktop-app-vue/out/make

      - name: Upload Linux artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Uploading artifacts to release ${TAG}..."
          for f in desktop-app-vue/out/make/zip/linux/x64/*.zip \
                   desktop-app-vue/out/make/deb/x64/*.deb \
                   desktop-app-vue/out/make/rpm/x64/*.rpm; do
            if [ -f "$f" ]; then
              echo "Uploading $f"
              gh release upload "$TAG" "$f" --clobber
            fi
          done
