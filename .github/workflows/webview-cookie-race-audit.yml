name: WebView Cookie Race Audit (PR advisory)

# Advisory gate for trap #20 (docs/internal/hidden-risk-traps.md §20).
#
# Detects WebViewClient.onPageFinished overrides that call
# CookieManager.getCookie(...) without a postDelayed defer. The trap:
# anti-spider keys (buvid3 / SUB / web_session / sessionid_ucp_v1) are
# written by JS that runs AFTER window.onload. onPageFinished fires AT
# window.onload — reading the cookie jar inline races and beats those
# writes → "login success" then 4-API empty on next sync.
#
# Advisory because the static heuristic accepts postDelayed / Handler.post
# / coroutine delay / LaunchedEffect / lifecycleScope.launch as deferral
# patterns, but may miss helper-function indirection (false positive)
# or mis-tag a defer pattern we haven't enumerated. Devs review the
# finding and either wrap with the canonical pattern or explain why
# the inline call is safe in this case.

on:
  pull_request:
    paths:
      - 'android-app/**/*.kt'
      - 'scripts/audit-webview-cookie-race.js'
      - '.github/workflows/webview-cookie-race-audit.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: webview-cookie-race-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run static audit
        id: audit
        continue-on-error: true
        run: |
          node scripts/audit-webview-cookie-race.js --json > /tmp/findings.json
          cat /tmp/findings.json | head -200

      - name: Comment on PR with findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- webview-cookie-race-audit-v1 -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let report;
            try {
              report = JSON.parse(fs.readFileSync('/tmp/findings.json', 'utf-8'));
            } catch {
              return;
            }
            const findings = report.findings || [];

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));

            if (findings.length === 0) {
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            const byFile = new Map();
            for (const f of findings) {
              if (!byFile.has(f.file)) byFile.set(f.file, []);
              byFile.get(f.file).push(f);
            }
            const fileBlocks = [...byFile.entries()].map(([file, hits]) => {
              const rows = hits.map(h => `- L${h.line} \`${h.severity}\` — ${h.message}`).join('\n');
              return `**\`${file}\`** (${hits.length})\n${rows}`;
            }).join('\n\n');

            const body = [
              marker,
              '## ⚠️ WebView Cookie Race Audit — advisory findings',
              '',
              `Found **${findings.length}** likely race(s) in ${byFile.size} file(s) across ${report.scanned} Kotlin files scanned.`,
              '',
              '### Why this matters',
              '',
              'Anti-spider keys on Bilibili / Weibo / Douyin / Xiaohongshu are written',
              'by JavaScript that runs AFTER `window.onload`. `WebViewClient.onPageFinished`',
              'fires AT `window.onload`. Reading the cookie jar inline races and beats',
              'those writes — cookies are missing required fields, the platform API',
              'returns silent `{code:0, data:{list:[]}}`, the user sees "登录成功" but',
              'next sync produces 0 events.',
              '',
              '### Findings',
              '',
              fileBlocks,
              '',
              '### Canonical fix',
              '',
              '```kotlin',
              'override fun onPageFinished(view: WebView, url: String) {',
              '    if (isLoginSuccess(url)) {',
              '        view.postDelayed({                                 // defer 2-5s',
              '            CookieManager.getInstance().flush()',
              '            val cookie = CookieManager.getInstance().getCookie(domain)',
              '            ...',
              '        }, COOKIE_CAPTURE_DELAY_MS)',
              '    }',
              '}',
              '```',
              '',
              'Reference: `android-app/.../pdh/social/SocialCookieWebViewScreen.kt:660`.',
              '',
              '### False positives',
              '',
              'The static heuristic recognizes `postDelayed`, `Handler.post(Delayed)`,',
              '`delay(N)`, `LaunchedEffect`, `lifecycleScope.launch` as valid defer',
              'patterns. If the deferral happens via a helper function call (e.g.',
              '`deferCookieCapture { getCookie(...) }`) it will not be detected and',
              'the finding is a false positive — explain in PR conversation.',
              '',
              `Run log: ${runUrl}`,
              '',
              '_Trap #20 in `docs/internal/hidden-risk-traps.md`. Auto-generated by `.github/workflows/webview-cookie-race-audit.yml`._',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
