name: Upstream Watch — Node 23 native-dep prebuild

# Watches for the day better-sqlite3-multiple-ciphers (and friends) ship ABI v131
# prebuilds so we can drop the engines.node `<23.0.0` exclusion in package.json.
#
# Currently `npm install` on Node 23 falls back to node-gyp from-source builds and
# breaks on machines without MSVC. When this workflow turns green, the trap is
# resolved and we can widen engines.node.

on:
  schedule:
    - cron: '0 4 * * 0'  # weekly, Sunday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: upstream-watch-node-23
  cancel-in-progress: false

jobs:
  check-node-23-install:
    name: npm install on Node 23.x (windows-latest, no MSVC)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '23.x'

      - name: Show toolchain
        shell: pwsh
        run: |
          node --version
          npm --version

      - name: Try npm install in desktop-app-vue on Node 23
        id: install
        continue-on-error: true
        working-directory: desktop-app-vue
        shell: pwsh
        run: |
          # npm only warns on engines mismatch by default — we want to see whether
          # native deps successfully resolve prebuilds (no .node-gyp fallback).
          npm install --no-audit --no-fund

      - name: Verify native deps actually loaded (require round-trip)
        if: steps.install.outcome == 'success'
        id: require_check
        continue-on-error: true
        working-directory: desktop-app-vue
        shell: pwsh
        run: |
          node -e "require('better-sqlite3-multiple-ciphers'); console.log('OK: better-sqlite3-multiple-ciphers loaded on Node ' + process.version);"

      - name: Open issue if Node 23 install AND native load both succeed
        if: steps.install.outcome == 'success' && steps.require_check.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Node 23 native-dep install succeeded — expand engines.node range';
            const labels = ['upstream-watch', 'enhancement'];
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-watch'
            });
            const existing = open.data.find(i => i.title === title);
            if (existing) {
              console.log(`Issue #${existing.number} already open, skipping`);
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## Upstream prebuilds now available on Node 23.x',
              '',
              `Weekly upstream-watch CI just succeeded \`npm install\` **and** \`require('better-sqlite3-multiple-ciphers')\` on Node 23.x.`,
              `Run: ${runUrl}`,
              '',
              'This means the ABI v131 prebuild that blocked us in v5.0.3 is now shipped.',
              '',
              '### Action items',
              '- [ ] Expand `engines.node` from `">=22.12.0 <23.0.0 || >=24.0.0"` to `">=22.12.0"` in:',
              '  - `package.json`',
              '  - `desktop-app-vue/package.json`',
              '- [ ] Remove the `_comment` Node-23-excluded warning in `desktop-app-vue/package.json`',
              '- [ ] Manually re-run `upstream-watch` after merge to confirm green on Node 22 + 23 + 24',
              '- [ ] Update memory `node_23_native_dep_trap.md` to reflect resolution',
              '',
              '_Auto-generated by `.github/workflows/upstream-watch.yml`. Close as wont-fix if no longer relevant._'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels,
              body
            });

      - name: Log expected-fail (Node 23 install still broken, no issue opened)
        if: steps.install.outcome != 'success' || steps.require_check.outcome != 'success'
        shell: pwsh
        run: |
          Write-Host "Node 23 trap still in effect — engines.node lock remains."
          Write-Host "install outcome: ${{ steps.install.outcome }}"
          Write-Host "require outcome: ${{ steps.require_check.outcome }}"
          Write-Host "Workflow exits 0 by design; we only signal on green."
