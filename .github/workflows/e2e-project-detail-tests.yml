name: E2E Project Detail Tests (Frontend-Only)

on:
  push:
    branches: [main, develop]
    paths:
      - 'desktop-app-vue/tests/e2e/project/detail/**'
      - 'desktop-app-vue/src/renderer/pages/projects/**'
      - 'desktop-app-vue/src/renderer/components/**'
      - '.github/workflows/e2e-project-detail-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'desktop-app-vue/tests/e2e/project/detail/**'
      - 'desktop-app-vue/src/renderer/pages/projects/**'
      - 'desktop-app-vue/src/renderer/components/**'
      - '.github/workflows/e2e-project-detail-tests.yml'
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - active-tests
          - new-tests
          - perfect-score-tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-project-detail:
    name: Project Detail E2E Tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # Allow failures for Windows due to known flakiness
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22.x]
        include:
          - os: ubuntu-latest
            display: ':99'
          - os: windows-latest
            display: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'desktop-app-vue/package-lock.json'

      - name: Install root dependencies
        uses: ./.github/actions/setup-node-deps
        with:
          install-command: npm install --legacy-peer-deps
          install-desktop-app-vue: "true"

      - name: Build main process
        working-directory: ./desktop-app-vue
        run: npm run build:main

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Xvfb for Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Run Active Tests (Week 1 + fixes) - 8 tests, expected 100% pass rate.
      # No continue-on-error: failures here block the workflow (matrix-level
      # c-o-e still allows windows-latest to fail per line 41).
      - name: Run Active Tests (Week 1)
        id: active-tests
        if: ${{ github.event.inputs.test-suite == 'all' || github.event.inputs.test-suite == 'active-tests' || github.event.inputs.test-suite == '' }}
        working-directory: ./desktop-app-vue
        shell: bash
        run: |
          # 2026-05-18 audit: dropped `|| echo "... status $?"` masks that hid
          # playwright failures behind a successful echo. set -e ensures the
          # first failure exits the step with the real exit code.
          set -e
          echo "Running Active Tests (Week 1 + fixes)..."

          # Run AI creating tests (7 tests)
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
              npx playwright test tests/e2e/project/detail/project-detail-ai-creating.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          else
            npx playwright test tests/e2e/project/detail/project-detail-ai-creating.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          fi
        env:
          CI: true
          ELECTRON_DISABLE_SECURITY_WARNINGS: 'true'
          ELECTRON_ENABLE_LOGGING: 'true'

      # Run Perfect Score Tests - Panels, UI State, Navigation (expected 100%).
      # No continue-on-error: failures block the workflow.
      - name: Run Perfect Score Tests
        id: perfect-score-tests
        if: ${{ github.event.inputs.test-suite == 'all' || github.event.inputs.test-suite == 'perfect-score-tests' || github.event.inputs.test-suite == '' }}
        working-directory: ./desktop-app-vue
        shell: bash
        run: |
          # 2026-05-18 audit: dropped `|| echo` masks. set -e exits on first
          # failure with the real playwright exit code.
          set -e
          echo "Running Perfect Score Tests..."

          # Run Panels tests (5/5 passing)
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
              npx playwright test tests/e2e/project/detail/project-detail-panels.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          else
            npx playwright test tests/e2e/project/detail/project-detail-panels.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          fi

          # Run UI State tests (3/3 passing)
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
              npx playwright test tests/e2e/project/detail/project-detail-ui-state.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          else
            npx playwright test tests/e2e/project/detail/project-detail-ui-state.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          fi

          # Run Navigation tests (5/5 passing)
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
              npx playwright test tests/e2e/project/detail/project-detail-navigation.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          else
            npx playwright test tests/e2e/project/detail/project-detail-navigation.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          fi
        env:
          CI: true
          ELECTRON_DISABLE_SECURITY_WARNINGS: 'true'
          ELECTRON_ENABLE_LOGGING: 'true'

      # Run All New Tests (Week 2) - includes modal/button tests with mixed
      # results that document UI behavior. Step-level continue-on-error: true
      # is the legitimate advisory gate here.
      - name: Run All New Tests (Week 2)
        id: new-tests
        if: ${{ github.event.inputs.test-suite == 'all' || github.event.inputs.test-suite == 'new-tests' }}
        working-directory: ./desktop-app-vue
        shell: bash
        run: |
          # 2026-05-18 audit: dropped `|| echo` (was redundant on top of
          # step-level continue-on-error). Step outcome now honestly reflects
          # whether mixed-results suites failed; the outer c-o-e keeps it
          # advisory for the job.
          set -e
          echo "Running All New Tests (Week 2)..."

          # Run Buttons tests (2/3 passing)
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
              npx playwright test tests/e2e/project/detail/project-detail-buttons.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          else
            npx playwright test tests/e2e/project/detail/project-detail-buttons.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          fi

          # Run Modals tests (1/5 passing - documents UI behavior)
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" \
              npx playwright test tests/e2e/project/detail/project-detail-modals.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          else
            npx playwright test tests/e2e/project/detail/project-detail-modals.e2e.test.ts \
              --timeout=180000 --reporter=list,html
          fi
        env:
          CI: true
          ELECTRON_DISABLE_SECURITY_WARNINGS: 'true'
          ELECTRON_ENABLE_LOGGING: 'true'
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-results-${{ matrix.os }}-${{ github.run_number }}
          path: desktop-app-vue/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-html-report-${{ matrix.os }}-${{ github.run_number }}
          path: desktop-app-vue/playwright-report/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-${{ matrix.os }}-${{ github.run_number }}
          path: desktop-app-vue/screenshots/
          if-no-files-found: ignore
          retention-days: 7

  # Generate test summary report
  test-summary:
    name: Test Summary Report
    needs: e2e-project-detail
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v7
        with:
          path: all-test-results

      - name: Generate test summary
        env:
          JOB_RESULT: ${{ needs.e2e-project-detail.result }}
        run: |
          # 2026-05-18 audit: removed hardcoded ✅ + "100% pass rate" / "67% pass
          # rate" / "~83%" literal claims that printed regardless of test
          # outcome. Status now reflects the actual e2e-project-detail job
          # result (which is honest now that the step-level `|| echo` masks
          # were dropped on Active + Perfect Score steps).
          case "$JOB_RESULT" in
            success) ICON="✅"; STATUS="Required suites passed" ;;
            skipped) ICON="⏭️"; STATUS="Skipped" ;;
            cancelled) ICON="🚫"; STATUS="Cancelled" ;;
            *) ICON="❌"; STATUS="One or more required suites failed" ;;
          esac

          echo "# 🧪 E2E Project Detail Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** Project Detail Frontend-Only Tests" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $ICON $STATUS (\`$JOB_RESULT\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 📊 Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Required suites (failures block the workflow):" >> $GITHUB_STEP_SUMMARY
          echo "- **Active Tests (Week 1):** AI Creating Mode (7 tests)" >> $GITHUB_STEP_SUMMARY
          echo "- **Perfect Score Tests:** Panels (5) + UI State (3) + Navigation (5) = 13 tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Advisory suites (continue-on-error: documents UI behavior):" >> $GITHUB_STEP_SUMMARY
          echo "- **Buttons:** 3 tests" >> $GITHUB_STEP_SUMMARY
          echo "- **Modals:** 5 tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "> Per-suite outcomes are visible in the matrix job logs above." >> $GITHUB_STEP_SUMMARY
          echo "> Detailed playwright reports are uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 📋 Test Results by Platform" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for os in ubuntu-latest windows-latest; do
            echo "### $os" >> $GITHUB_STEP_SUMMARY

            # Artifact presence is a coarse signal — it means the matrix job
            # reached the upload step, not that tests passed. The real status
            # is the job outcome above.
            result_dir="all-test-results/playwright-results-$os-${{ github.run_number }}"
            if [ -d "$result_dir" ]; then
              echo "Artifacts uploaded" >> $GITHUB_STEP_SUMMARY
              test_count=$(find "$result_dir" -name "*.xml" 2>/dev/null | wc -l || echo "0")
              echo "- Test result files: $test_count" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ No artifacts uploaded (matrix job may have failed before upload step)" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "## 📚 Documentation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "For detailed test documentation, see:" >> $GITHUB_STEP_SUMMARY
          echo "- [\`WEEK2_ALL_TESTS_RESULTS.md\`](../desktop-app-vue/tests/e2e/WEEK2_ALL_TESTS_RESULTS.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [\`WEEK2_SELECTOR_FIXES.md\`](../desktop-app-vue/tests/e2e/WEEK2_SELECTOR_FIXES.md)" >> $GITHUB_STEP_SUMMARY
          echo "- [\`WEEK2_DAY1_COMPLETE.md\`](../desktop-app-vue/tests/e2e/WEEK2_DAY1_COMPLETE.md)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by Week 2 CI/CD Integration*" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            // 2026-05-18 audit: removed hardcoded ✅ + "100% pass rate" literal
            // claims that printed regardless of test outcome. Status is now
            // derived from the e2e-project-detail job result.
            const jobResult = '${{ needs.e2e-project-detail.result }}';
            const mark = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : s === 'cancelled' ? '🚫' : '❌';
            const statusLine = jobResult === 'success'
              ? '✅ Required suites passed'
              : jobResult === 'cancelled' ? '🚫 Cancelled'
              : jobResult === 'skipped' ? '⏭️ Skipped'
              : '❌ One or more required suites failed';

            const output = `
            ## 🧪 E2E Project Detail Test Results

            **Status:** ${statusLine} (\`${jobResult}\`)
            **Test Suite:** Project Detail Frontend-Only Tests

            ### 📊 Test Coverage
            - ${mark(jobResult)} **Required suites** (Active Tests + Perfect Score, 20 tests total) — block on failure
            - ℹ️ **Advisory suites** (Buttons + Modals, 8 tests) — documents UI behavior, continue-on-error

            ### 🎯 Key Metrics
            - **Total Tests:** 28 frontend-only tests (20 required + 8 advisory)
            - **No Backend Required:** Tests run without external services
            - **CI/CD Ready:** Fully automated execution

            ### 📚 Documentation
            See [\`WEEK2_ALL_TESTS_RESULTS.md\`](../desktop-app-vue/tests/e2e/WEEK2_ALL_TESTS_RESULTS.md) for detailed results.

            ---

            Check the **Actions** tab for matrix job logs, per-suite outcomes, and uploaded playwright reports.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
