name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 快速测试（只运行核心测试）
  quick-tests:
    name: Quick Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            desktop-app-vue/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Jest tests (no coverage)
        id: jest
        run: npm run test:jest

      - name: Run Vitest tests (no coverage)
        id: vitest
        if: ${{ !cancelled() }}
        run: npx vitest run tests/unit/ai/ai-engine-workflow.test.js tests/unit/ai/ai-skill-scheduler.test.js

      - name: Comment PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const mark = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';
            const jest = '${{ steps.jest.outcome }}';
            const vitest = '${{ steps.vitest.outcome }}';
            const output = `## 🧪 Test Results

            - ${mark(jest)} Jest tests: \`${jest}\`
            - ${mark(vitest)} Vitest tests: \`${vitest}\`

            For detailed coverage reports, please check the full test workflow.
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # 代码质量检查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            desktop-app-vue/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Check for test files
        run: |
          changed_files=$(git diff --name-only origin/main...HEAD)
          test_files=$(echo "$changed_files" | grep -E '\.test\.(js|ts)$' || true)

          if [ -z "$test_files" ]; then
            echo "⚠️ Warning: No test files were modified in this PR"
            echo "warning=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Test files found: $test_files"
          fi
