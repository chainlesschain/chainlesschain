name: Android CI

on:
  push:
    branches: [main, develop]
    paths:
      - "android-app/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "android-app/**"
      - ".github/workflows/android-ci.yml"
  # 允许手动触发
  workflow_dispatch:

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    # 15m was too tight — Android lint over the whole project runs ~15m18s and
    # hit the timeout → job cancelled → Build APK (needs lint==success) skipped.
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: android-app
        run: chmod +x ./gradlew

      - name: Run Detekt
        working-directory: android-app
        continue-on-error: true
        run: ./gradlew detekt

      - name: Upload Detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: android-app/app/build/reports/detekt/

      - name: Run Android Lint
        working-directory: android-app
        continue-on-error: true
        run: ./gradlew lintDebug

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            android-app/app/build/reports/lint-results-debug.html
            android-app/app/build/reports/lint-results-debug.xml

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: android-app
        run: chmod +x ./gradlew

      - name: Run Library Module Unit Tests
        working-directory: android-app
        run: |
          # Library modules tested separately from :app for failure-isolation
          # diagnostic clarity (each step's outcome attributes failures
          # cleanly to either core libs or the app module).
          ./gradlew :core-common:testDebugUnitTest :core-database:testDebugUnitTest :core-security:testDebugUnitTest \
            :core-did:testDebugUnitTest :core-e2ee:testDebugUnitTest :core-p2p:testDebugUnitTest \
            :core-blockchain:testDebugUnitTest :core-network:testDebugUnitTest --stacktrace

      # continue-on-error dropped 2026-05-18: the prior mask claimed "known
      # compilation issues in remote/ package", but a local clean build of
      # :app:testDebugUnitTest passed (3m 56s, no errors) after the minSdk 26→28
      # fix unblocked manifest merger. The "remote/" claim was stale — likely
      # resolved months earlier but the mask was never cleaned up. See
      # feedback_ci_false_green_audit_checklist.md.
      - name: Run App Module Unit Tests
        working-directory: android-app
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Generate Coverage Report
        working-directory: android-app
        continue-on-error: true
        run: ./gradlew jacocoTestReport

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: android-app/app/build/test-results/

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: android-app/app/build/reports/jacoco/

      - name: Comment Test Results on PR
        if: github.event_name == 'pull_request' && always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: android-app/app/build/test-results/**/*.xml
          check_name: Unit Test Results

  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint]
    if: always() && needs.lint.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: android-app
        run: chmod +x ./gradlew

      # continue-on-error dropped 2026-05-18: local :app:assembleDebug passed
      # (15m 31s, 3 APKs produced) after the minSdk 26→28 fix unblocked
      # manifest merger. Same audit batch as the testDebugUnitTest mask
      # above. See feedback_ci_false_green_audit_checklist.md.
      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android-app/app/build/outputs/apk/debug/*.apk

  instrumented-test:
    # 2026-05-22: switched macos-latest → ubuntu-latest because GitHub's
    # macos-latest is now Apple Silicon (aarch64) and refuses to launch
    # x86_64 AVDs ("Avd's CPU Architecture 'x86_64' is not supported by
    # the QEMU2 emulator on aarch64 host"). ubuntu-latest has KVM and
    # runs x86_64 emulators natively — same pattern as the working
    # android-tests.yml::instrumented-tests job. The legacy comment said
    # "macOS provides faster emulators" — true on Intel Mac runners, no
    # longer applicable since GitHub's macOS migration.
    name: Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [lint]
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        # 2026-05-27: switched from [26, 33] → [28, 30]. APK ships only
        # armeabi-v7a + arm64-v8a (app/build.gradle.kts:76). x86_64 emulators
        # at API 26/33 lack ndk_translation → "No compatible devices
        # connected" 100% fail. API 28/30 ship ndk_translation and run the
        # arm APK natively — proven green by android-tests.yml::instrumented
        # under the same x86_64 runner. See memory
        # [[android_e2e_api33_abi_mismatch]] for the full root-cause writeup.
        api-level: [28, 30] # Test on Android 9 (Pie) and 11 (R)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: android-app
        run: chmod +x ./gradlew

      - name: Enable KVM group permissions
        # x86_64 emulator on ubuntu-latest needs /dev/kvm world-writable.
        # Mirrors android-tests.yml::instrumented-tests step.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # 2026-05-27: scope cache key to this workflow. The bare
          # `avd-${matrix.api-level}` prefix-collided with android-build.yml's
          # `avd-${matrix.api-level}-ubuntu-v2` cache after the matrix moved
          # to [28, 30] — actions/cache@v4 restore-key fallback handed back a
          # foreign AVD with an incompatible config.ini, the emulator launched
          # but immediately logged "no valid sdk root directory" and never
          # opened port 5554 (run 26479612061 / job 77974125586).
          key: avd-android-ci-${{ matrix.api-level }}-v1

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # Step-level continue-on-error dropped 2026-05-18 second sweep: was
      # redundant with the job-level `continue-on-error: true` above (L204).
      # Double-masking made the step outcome lie — gradle result is now the
      # source of truth, with the outer job-level mask still keeping emulator
      # flakiness from blocking the pipeline.
      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: cd android-app && ./gradlew connectedDebugAndroidTest

      - name: Upload Instrumented Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: android-app/app/build/reports/androidTests/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        working-directory: android-app
        run: chmod +x ./gradlew

      # Inline `|| true` promoted to step-level continue-on-error 2026-05-18
      # second sweep: undocumented inline mask was hiding real OWASP findings
      # behind a green step icon. Step outcome now reflects actual scan result
      # (failure if vulns found); job still doesn't block on this (the notify
      # job's gate only checks lint/test/build, not security-scan), so the
      # advisory model is preserved without the false-green.
      - name: Run Dependency Check
        working-directory: android-app
        continue-on-error: true
        run: ./gradlew dependencyCheckAnalyze

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: android-app/app/build/reports/dependency-check-report.html

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [lint, test, build, instrumented-test]
    if: always()

    steps:
      - name: Check job status
        id: check
        run: |
          if [[ "${{ needs.lint.result }}" == "success" && \
                "${{ needs.test.result }}" == "success" && \
                "${{ needs.build.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Instrumented Tests | ${{ needs.instrumented-test.result }} |" >> $GITHUB_STEP_SUMMARY
