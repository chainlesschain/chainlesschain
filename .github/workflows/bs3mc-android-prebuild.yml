name: better-sqlite3-multiple-ciphers Android arm64 prebuild

# Plan A Sub-Phase A2.2 — NDK cross-compile of better-sqlite3-multiple-ciphers
# Android arm64 native binding so the Personal Data Hub's LocalVault can run
# inside the in-APK bundled cc CLI (Phase 2.5).
#
# Why a SEPARATE workflow (not folded into node-runtime-bundle.yml):
#  - bs3mc build is slow (~5-10 min) + uncertain (node-gyp Android cross-
#    compile has known gotchas). Keeping it isolated means Phase 2.5
#    iterations don't pay this cost on every Node version bump.
#  - bs3mc version bumps are rare (~quarterly) vs nodejs-lts that bumps
#    when Termux apt rolls. Different cadence = different workflows.
#  - First-version iteration: this workflow may FAIL repeatedly while we
#    sort the right NDK/headers/flags combo. Isolation means Phase 2.5
#    bundle refresh stays green.
#
# Trigger: workflow_dispatch only (manual). Once stable, future v2 will
# auto-trigger on bs3mc package.json version bump in packages/personal-
# data-hub/.
#
# Output (v1): build/Release/better_sqlite3.node uploaded as artifact +
# DT_NEEDED + size diagnostic. v2 will commit the binary to a tracked
# path under android-app/feature-local-terminal/src/main/assets/local-
# terminal/prebuilds/ so node-runtime-bundle.yml can inject it.
#
# Spec: docs/design/Personal_Data_Hub_Android_Standalone_Cc.md §7 Sub-
# Phase A2.2 + §9 Trap 2.

on:
  workflow_dispatch:
    inputs:
      bs3mc_version:
        description: "better-sqlite3-multiple-ciphers npm version to build"
        default: "12.9.0"
        required: false
      node_target_version:
        description: "Node.js major version to target for headers/ABI"
        default: "24.15.0"
        required: false
      api_level:
        description: "Android API level (matches app minSdkVersion)"
        default: "30"
        required: false
      ndk_version:
        description: "Android NDK version"
        default: "r27c"
        required: false

permissions:
  contents: read

jobs:
  build:
    name: Cross-compile bs3mc Android arm64
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install host build tools (patchelf, file, binutils)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y patchelf file binutils python3 python-is-python3
          patchelf --version
          python3 --version

      - name: Setup Node.js for node-gyp
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Host Node — used to invoke node-gyp; does NOT
                              # affect ABI of cross-compiled output (that's
                              # set by --target via --nodedir headers).

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ inputs.ndk_version }}
          local-cache: true

      - name: Download Node ${{ inputs.node_target_version }} headers
        run: |
          set -euo pipefail
          NV="${{ inputs.node_target_version }}"
          HEADERS_URL="https://nodejs.org/download/release/v${NV}/node-v${NV}-headers.tar.gz"
          echo "Fetching: $HEADERS_URL"
          curl -fsSL --retry 3 --retry-delay 2 -o /tmp/node-headers.tar.gz "$HEADERS_URL"
          mkdir -p /tmp/node-headers
          tar -xzf /tmp/node-headers.tar.gz -C /tmp/node-headers --strip-components=1
          ls /tmp/node-headers/include/node/ | head -5
          echo "Node headers ready at /tmp/node-headers"

      - name: npm install better-sqlite3-multiple-ciphers (source only)
        run: |
          set -euo pipefail
          mkdir -p /tmp/bs3mc-build
          cd /tmp/bs3mc-build
          npm init -y >/dev/null
          # --ignore-scripts: skip prebuild-install + node-gyp rebuild. We'll
          # invoke node-gyp manually with cross-compile flags.
          npm install --ignore-scripts --no-audit --no-fund \
            "better-sqlite3-multiple-ciphers@${{ inputs.bs3mc_version }}"
          BS3MC="node_modules/better-sqlite3-multiple-ciphers"
          ls "$BS3MC"
          echo "binding.gyp:"
          cat "$BS3MC/binding.gyp"

      - name: Cross-compile bs3mc for Android arm64
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          API_LEVEL: ${{ inputs.api_level }}
        run: |
          set -euo pipefail
          BS3MC=/tmp/bs3mc-build/node_modules/better-sqlite3-multiple-ciphers
          cd "$BS3MC"

          # Locate NDK toolchain binaries
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          [ -d "$TOOLCHAIN" ] || {
            echo "::error::NDK toolchain not found at $TOOLCHAIN"
            ls "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/" 2>/dev/null || true
            exit 1
          }

          # Cross-compile env
          export CC="$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang"
          export CXX="$TOOLCHAIN/bin/aarch64-linux-android${API_LEVEL}-clang++"
          export AR="$TOOLCHAIN/bin/llvm-ar"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export STRIP="$TOOLCHAIN/bin/llvm-strip"
          export LD="$TOOLCHAIN/bin/ld.lld"

          # Sanity check toolchain
          "$CXX" --version
          "$CC" --version

          # Compile flags:
          #  - -fPIC: required for shared object .node
          #  - -std=c++20: bs3mc binding.gyp requires this
          #  - -DANDROID: marks Android platform for upstream conditionals
          # Link flags:
          #  - -static-libstdc++: clang-on-Android maps libstdc++ → libc++;
          #    static linking embeds libc++ symbols in .node, avoiding the
          #    Termux libc++ vs NDK libc++ ABI drift trap from Phase 2.5
          #    (see memory `android_local_terminal_phase_2_5` trap 5).
          export CFLAGS="-fPIC -DANDROID"
          export CXXFLAGS="-fPIC -DANDROID -std=c++20"
          export LDFLAGS="-static-libstdc++"
          export GYP_DEFINES="OS=android target_arch=arm64 host_os=linux"

          # Run node-gyp
          npx -p node-gyp@latest node-gyp configure \
            --target_arch=arm64 \
            --target_platform=android \
            --nodedir=/tmp/node-headers \
            --verbose 2>&1 | tee /tmp/node-gyp-configure.log

          npx -p node-gyp@latest node-gyp build \
            --verbose 2>&1 | tee /tmp/node-gyp-build.log

      - name: Verify cross-compile output
        run: |
          set -euo pipefail
          NODE_BIN=/tmp/bs3mc-build/node_modules/better-sqlite3-multiple-ciphers/build/Release/better_sqlite3.node

          if [ ! -f "$NODE_BIN" ]; then
            echo "::error::Build did not produce $NODE_BIN"
            find /tmp/bs3mc-build/node_modules/better-sqlite3-multiple-ciphers/build -maxdepth 4 -type f 2>/dev/null | head -20
            exit 1
          fi

          echo "::group::file output"
          file "$NODE_BIN"
          echo "::endgroup::"

          echo "::group::Size"
          du -h "$NODE_BIN"
          echo "::endgroup::"

          echo "::group::DT_NEEDED (must be subset of {libc.so, libdl.so, libm.so, libc++_shared.so})"
          patchelf --print-needed "$NODE_BIN"
          echo "::endgroup::"

          echo "::group::SONAME"
          patchelf --print-soname "$NODE_BIN" 2>/dev/null || echo "(no SONAME)"
          echo "::endgroup::"

          # Strip debug info — bs3mc with full debug is ~3MB; stripped ~700KB.
          echo "::group::Strip"
          BEFORE=$(stat -c%s "$NODE_BIN")
          "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" \
            "$NODE_BIN" || echo "::warning::strip failed, shipping unstripped"
          AFTER=$(stat -c%s "$NODE_BIN")
          echo "Before strip: $BEFORE bytes"
          echo "After strip:  $AFTER bytes"
          echo "::endgroup::"

          # Defensive patchelf — if libc++_shared.so is in DT_NEEDED, rename
          # it to libtermux_cxx.so to match Phase 2.5 shipping convention.
          if patchelf --print-needed "$NODE_BIN" 2>/dev/null \
             | grep -q '^libc++_shared\.so'; then
            echo "patching libc++_shared.so → libtermux_cxx.so"
            patchelf --replace-needed libc++_shared.so libtermux_cxx.so "$NODE_BIN"
            echo "post-patch DT_NEEDED:"
            patchelf --print-needed "$NODE_BIN"
          else
            echo "(libc++_shared.so not in DT_NEEDED — static-libstdc++ worked, no patch needed)"
          fi

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: bs3mc-android-arm64-node${{ inputs.node_target_version }}-bs3mc${{ inputs.bs3mc_version }}
          path: /tmp/bs3mc-build/node_modules/better-sqlite3-multiple-ciphers/build/Release/better_sqlite3.node
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bs3mc-build-logs
          path: |
            /tmp/node-gyp-configure.log
            /tmp/node-gyp-build.log
          if-no-files-found: warn
          retention-days: 7
