<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' app://*; script-src 'self' 'unsafe-eval' app://* http://localhost:* http://127.0.0.1:*; style-src 'self' 'unsafe-inline' app://* http://localhost:* http://127.0.0.1:*; img-src 'self' app://* data: blob: file: https: http://localhost:* http://127.0.0.1:* http://res.zlib.net; font-src 'self' data:; connect-src 'self' app://* http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; media-src 'self' blob: data:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainlessChain - 个人AI知识库</title>
    <!-- Inline style extracted to public/splash-loading.css to avoid Vite 7 +
    Rollup 4.60 strict source-phase import error on `index.html?html-proxy&
    inline-css` virtual modules. Public file is served as-is, no bundling. -->
    <link rel="stylesheet" href="/splash-loading.css" />
  </head>
  <body style="margin:0;background:#764ba2;">
    <!-- Vue 挂载目标 -->
    <div id="app"></div>

    <!-- 页面加载动画：Vue 挂载前全程可见，挂载完成后淡出移除 -->
    <div id="page-loading">
      <div class="pl-outer-glow"></div>
      <div class="pl-logo-wrap">
        <div class="pl-logo-shadow"></div>
        <div class="pl-ring pl-ring-1"></div>
        <div class="pl-ring pl-ring-2"></div>
        <img id="pl-logo-img" class="pl-logo" alt="ChainlessChain" />
        <div class="pl-shine"></div>
      </div>
      <div class="pl-brand">CHAINLESSCHAIN</div>
      <div class="pl-dots">
        <div class="pl-dot"></div>
        <div class="pl-dot"></div>
        <div class="pl-dot"></div>
      </div>
    </div>

    <!-- Logo loader extracted to external file so the strict CSP can
         stay (no 'unsafe-inline' / no per-script hash maintenance). -->
    <script src="/splash-logo-loader.js"></script>

    <script type="module" src="/main.js"></script>
  </body>
</html>
