# /www/server/panel/vhost/nginx/signaling.chainlesschain.com.conf
# 公网 wss → 内部 ws://127.0.0.1:9001 (cc-signaling-relay docker)
# 证书由 BT 面板 / certbot 单独管理；本文件只管反代逻辑

server {
    listen 80;
    listen [::]:80;
    server_name signaling.chainlesschain.com;

    # HTTP → HTTPS 跳转。Let's Encrypt webroot 验证留 /.well-known/acme-challenge 直通
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/signaling.chainlesschain.com;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name signaling.chainlesschain.com;

    # SSL — 路径由 cert 申请脚本生成后填入
    ssl_certificate     /www/server/panel/vhost/cert/signaling.chainlesschain.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/signaling.chainlesschain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    access_log /www/wwwlogs/signaling.chainlesschain.com.log;
    error_log  /www/wwwlogs/signaling.chainlesschain.com.error.log;

    # 健康探活（http）
    location = /health {
        proxy_pass http://127.0.0.1:9001/health;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # 默认 WebSocket 反代 — 所有路径透传
    location / {
        proxy_pass http://127.0.0.1:9001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接 — 默认 60s 太短，pairing-listener 静默时段长
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }
}
