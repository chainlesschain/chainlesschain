services:
  relay:
    build: ./server
    container_name: cc-signaling-relay
    restart: unless-stopped
    ports:
      # 只 bind 到 127.0.0.1，nginx 反代过来；不暴露外网（外网走 wss://443）
      - "127.0.0.1:9001:9001"
    environment:
      - NODE_ENV=production
      - PORT=9001
      - HOST=0.0.0.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
